name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into app
        env:
          CLIENT_EMAIL: ${{ secrets.SHEETS_CLIENT_EMAIL }}
          PRIVATE_KEY: ${{ secrets.SHEETS_PRIVATE_KEY }}
          SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, re

          email  = os.environ['CLIENT_EMAIL']
          key    = os.environ['PRIVATE_KEY']
          sid    = os.environ['SPREADSHEET_ID']

          # Normalize newlines in private key
          key = key.replace('\\n', '\n')

          with open('index.html', 'r') as f:
              html = f.read()

          html = html.replace('__SHEETS_CLIENT_EMAIL__', email)
          html = html.replace('__SHEETS_SPREADSHEET_ID__', sid)
          # Key goes inside a template literal - escape backticks and backslashes
          key_escaped = key.replace('\\', '\\\\').replace('`', '\\`')
          html = html.replace('__SHEETS_PRIVATE_KEY__', key_escaped)

          with open('index.html', 'w') as f:
              f.write(html)

          print("Injection complete")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
