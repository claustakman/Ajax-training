<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajax Træning – Tests</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;display:flex;height:100vh;overflow:hidden;}
  #panel{width:420px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #2d3748;background:#141820;}
  #panel-header{padding:16px 20px;border-bottom:1px solid #2d3748;}
  h1{font-size:17px;font-weight:800;color:#fff;letter-spacing:.04em;}
  #stats{display:flex;gap:12px;margin-top:10px;font-size:13px;}
  .stat{padding:4px 10px;border-radius:5px;font-weight:700;}
  .stat.pass{background:rgba(34,197,94,.15);color:#4ade80;}
  .stat.fail{background:rgba(239,68,68,.15);color:#f87171;}
  .stat.skip{background:rgba(100,116,139,.15);color:#94a3b8;}
  #controls{padding:12px 20px;border-bottom:1px solid #2d3748;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  button{padding:7px 14px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600;}
  #runBtn{background:#C8102E;color:#fff;}
  #runBtn:hover{background:#a50d25;}
  #runBtn:disabled{opacity:.5;cursor:default;}
  #clearBtn{background:#1e2533;color:#94a3b8;border:1px solid #2d3748;}
  #filterFail{background:#1e2533;color:#94a3b8;border:1px solid #2d3748;}
  #filterFail.active{background:rgba(239,68,68,.2);color:#f87171;border-color:#f87171;}
  #app-status{font-size:12px;color:#64748b;margin-left:auto;}
  #results{flex:1;overflow-y:auto;padding:12px 20px;}
  .suite{margin-bottom:16px;}
  .suite-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #1e2533;}
  .test{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:13px;border-bottom:1px solid #1a2030;}
  .test:last-child{border-bottom:none;}
  .badge{flex-shrink:0;width:20px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
  .badge.pass{background:rgba(34,197,94,.2);color:#4ade80;}
  .badge.fail{background:rgba(239,68,68,.2);color:#f87171;}
  .badge.skip{background:rgba(100,116,139,.15);color:#64748b;}
  .badge.running{background:rgba(234,179,8,.2);color:#facc15;animation:pulse .8s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .test-name{flex:1;line-height:1.4;}
  .test-err{font-size:11px;color:#f87171;margin-top:2px;}
  #frame-wrap{flex:1;display:flex;flex-direction:column;position:relative;}
  #frame-label{background:#1e2533;padding:6px 14px;font-size:11px;color:#64748b;border-bottom:1px solid #2d3748;display:flex;align-items:center;gap:8px;}
  #iframe-status{width:8px;height:8px;border-radius:50%;background:#64748b;flex-shrink:0;transition:background .3s;}
  #iframe-status.ready{background:#4ade80;}
  #iframe-status.loading{background:#facc15;animation:pulse .8s infinite;}
  iframe{flex:1;border:none;width:100%;background:#fff;}
</style>
</head>
<body>

<div id="panel">
  <div id="panel-header">
    <h1>🧪 Ajax Træning – Tests</h1>
    <div id="stats">
      <span class="stat pass" id="s-pass">✓ 0</span>
      <span class="stat fail" id="s-fail">✗ 0</span>
      <span class="stat skip" id="s-skip">– 0</span>
    </div>
  </div>
  <div id="controls">
    <button id="runBtn" disabled>▶ Kør alle tests</button>
    <button id="clearBtn">Ryd</button>
    <button id="filterFail">Kun fejl</button>
    <span id="app-status">Venter på app…</span>
  </div>
  <div id="results"><p style="color:#475569;font-size:13px;margin-top:20px;text-align:center;">Venter på at appen loader…</p></div>
</div>

<div id="frame-wrap">
  <div id="frame-label">
    <span id="iframe-status" class="loading"></span>
    <span id="frame-url">index.html</span>
    <span style="margin-left:auto;font-size:11px;" id="frame-action">Indlæser…</span>
  </div>
  <iframe id="app" src="index.html"></iframe>
</div>

<script>
const iframe = document.getElementById('app');
const resultsEl = document.getElementById('results');
let appWin, appDoc, S, appRender, allResults=[], filterFail=false;

// ── Wait for app to be ready ─────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function waitForApp(timeout = 10000) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    try {
      const w = iframe.contentWindow;
      if (w && w._ajaxApp && w._ajaxApp.getS()) {
        return true;
      }
    } catch(e) {}
    await sleep(100);
  }
  return false;
}

iframe.addEventListener('load', async () => {
  document.getElementById('iframe-status').className = 'loading';
  document.getElementById('frame-action').textContent = 'Venter på app-init…';

  const ready = await waitForApp();
  if (!ready) {
    document.getElementById('frame-action').textContent = '⚠ App ikke klar – tjek konsol';
    document.getElementById('app-status').textContent = '⚠ Fejl';
    return;
  }

  appWin = iframe.contentWindow;
  appDoc = iframe.contentDocument;
  S = () => appWin._ajaxApp.getS();
  appRender = () => appWin._ajaxApp.getRender()();

  document.getElementById('iframe-status').className = 'ready';
  document.getElementById('frame-action').textContent = 'Klar';
  document.getElementById('app-status').textContent = '✓ App klar';
  document.getElementById('runBtn').disabled = false;
  resultsEl.innerHTML = '<p style="color:#475569;font-size:13px;margin-top:20px;text-align:center;">Tryk "Kør alle tests" for at starte</p>';
});

// ── DOM helpers ───────────────────────────────────────────────────────────────
const ge = id => appDoc.getElementById(id);
const qs = sel => appDoc.querySelector(sel);
const qsa = sel => [...appDoc.querySelectorAll(sel)];

function click(el) {
  if (!el) throw new Error('Element ikke fundet');
  el.click();
}

async function waitFor(fn, timeout=2500) {
  const start = Date.now();
  while (Date.now()-start < timeout) {
    try { const v = fn(); if(v) return v; } catch {}
    await sleep(60);
  }
  throw new Error('Timeout – element dukkede ikke op');
}

async function goTab(tab) {
  const btn = qsa('.nav-tab').find(b => b.textContent.trim().toLowerCase().includes(tab.toLowerCase()));
  if (!btn) throw new Error(`Fane ikke fundet: ${tab}`);
  btn.click();
  await sleep(200);
}

async function resetToTraening() {
  S().draft = null;
  S().modal = null;
  S().tab = 'traening';
  appRender();
  await sleep(150);
}

async function createDraftTraining() {
  const hal = S().halCatalog;
  S().draft = {
    id: 'test-' + Date.now(),
    date: '2026-03-15',
    startTime: '17:00',
    endTime: '18:30',
    location: 'Valby',
    trainers: ['Claus'],
    themes: [],
    focusPoints: 'Test fokus',
    notes: '',
    stars: 3,
    sections: [
      { type: 'opvarmning', mins: 15, collapsed: false, exercises: [
        { exerciseId: hal[0]?.id, done: false },
        { exerciseId: hal[1]?.id, done: false },
      ]},
      { type: 'spil', mins: 30, collapsed: false, exercises: [
        { exerciseId: hal[2]?.id, done: false },
      ]}
    ]
  };
  S().tab = 'traening';
  appRender();
  await sleep(200);
}

// ── Suites ────────────────────────────────────────────────────────────────────
const suites = [];
function suite(name, tests) { suites.push({name, tests}); }
function test(name, fn) { return {name, fn}; }

suite('Navigation', [
  test('Fanen "Træning" virker', async () => {
    await goTab('Træning');
    if (S().tab !== 'traening') throw new Error('Tab ikke sat til traening');
  }),
  test('Fanen "Årshjul" virker', async () => {
    await goTab('Årshjul');
    await waitFor(() => qs('.q-card, [class*="aarshjul"]'));
  }),
  test('Fanen "Katalog" virker', async () => {
    await goTab('Katalog');
    await waitFor(() => ge('catQ'));
  }),
  test('Fanen "Arkiv" virker', async () => {
    await goTab('Arkiv');
    await waitFor(() => qs('.arch-tbl, .empty'));
  }),
  test('Kan navigere tilbage til Træning', async () => {
    await goTab('Træning');
    if (S().tab !== 'traening') throw new Error('Tab ikke traening');
  }),
]);

suite('Ny træning – editor', [
  test('"Ny træning" knap åbner editor', async () => {
    await resetToTraening();
    const btn = qsa('button').find(b => b.textContent.includes('Ny træning'));
    if (!btn) throw new Error('"Ny træning" knap ikke fundet');
    btn.click();
    await waitFor(() => ge('e-date'));
  }),
  test('Dato-felt findes', async () => {
    if (!ge('e-date')) throw new Error('e-date mangler');
  }),
  test('Sted-pills findes (3 stk)', async () => {
    const pills = qsa('[data-loc]');
    if (pills.length < 3) throw new Error(`Kun ${pills.length} sted-pills`);
  }),
  test('Valg af sted virker', async () => {
    click(qs('[data-loc="Valby"]'));
    await sleep(100);
    if (!qs('[data-loc="Valby"].active')) throw new Error('Valby ikke aktiv');
  }),
  test('Stjerne-vurdering kan sættes', async () => {
    const stars = qsa('[data-estr]');
    if (!stars.length) throw new Error('Stjerner ikke fundet');
    stars[2].click();
    await sleep(100);
    if (qsa('[data-estr].filled').length !== 3) throw new Error('Forventede 3 fyldte stjerner');
  }),
  test('"Tilføj sektion" åbner modal', async () => {
    click(ge('addSecBtn'));
    await waitFor(() => qs('.modal'));
  }),
  test('Sektion kan vælges i modal', async () => {
    await waitFor(() => qs('[data-picksec]'));
    qs('[data-picksec]').click();
    await sleep(200);
    if (qs('.modal')) throw new Error('Modal lukkede ikke');
    if (!qsa('.sec-block').length) throw new Error('Ingen sektion oprettet');
  }),
  test('"+ Øvelse" åbner øvelse-picker', async () => {
    click(qs('[data-addex="0"]'));
    await waitFor(() => ge('exPickQ'));
  }),
  test('Kan vælge øvelse fra picker', async () => {
    await waitFor(() => qs('[data-pickex]'));
    qs('[data-pickex]').click();
    await sleep(200);
    if (!qsa('.ex-row').length) throw new Error('Ingen øvelse tilføjet');
  }),
  test('"← Tilbage" lukker editor', async () => {
    click(ge('cancelBtn'));
    await sleep(200);
    if (S().draft !== null) throw new Error('Draft ikke clearet');
  }),
]);

suite('Editor – eksisterende træning', [
  test('Opret draft med sektioner', async () => {
    await createDraftTraining();
    if (!ge('e-date')) throw new Error('Editor ikke åben');
    if (!S().draft?.sections?.length) throw new Error('Ingen sektioner i draft');
  }),
  test('Oplysninger kan kollapses', async () => {
    click(ge('info-toggle'));
    await sleep(150);
    if (ge('info-body').style.display !== 'none') throw new Error('info-body ikke skjult');
  }),
  test('Oplysninger kan åbnes igen', async () => {
    click(ge('info-toggle'));
    await sleep(150);
    if (ge('info-body').style.display === 'none') throw new Error('info-body stadig skjult');
  }),
  test('Sektion kan kollapses', async () => {
    click(qs('[data-collapse="0"]'));
    await sleep(200);
    if (!S().draft.sections[0].collapsed) throw new Error('Ikke collapsed i state');
  }),
  test('Sektion kan åbnes igen', async () => {
    click(qs('[data-collapse="0"]'));
    await sleep(200);
    if (S().draft.sections[0].collapsed) throw new Error('Stadig collapsed');
  }),
  test('Øvelse-checkbox kan afkrydses', async () => {
    const chk = qs('[data-excheck="0-0"]');
    if (!chk) throw new Error('Checkbox ikke fundet');
    chk.click();
    await sleep(150);
    if (!S().draft.sections[0].exercises[0].done) throw new Error('done ikke true');
  }),
  test('Afkrydset øvelse viser ✓ visuelt', async () => {
    if (!qs('[data-excheck="0-0"].checked')) throw new Error('Checkbox ikke markeret');
  }),
  test('Sektion viser tæller efter afkrydsning', async () => {
    const ind = qs('.sec-progress, .sec-done-badge');
    if (!ind) throw new Error('Tæller ikke fundet');
  }),
  test('Alle øvelser i sektion → Færdig badge', async () => {
    qs('[data-excheck="0-1"]')?.click();
    await sleep(150);
    if (!qs('.sec-done-badge')) throw new Error('"Færdig" badge ikke vist');
  }),
  test('Sektion kan slettes', async () => {
    const before = S().draft.sections.length;
    click(qs('[data-delsec]'));
    await sleep(200);
    if (S().draft.sections.length !== before - 1) throw new Error('Sektion ikke slettet');
  }),
  test('"Gem træning" gemmer og lukker editor', async () => {
    click(ge('saveTBtn'));
    await sleep(300);
    if (S().draft !== null) throw new Error('Draft ikke clearet efter gem');
  }),
]);

suite('Katalog', [
  test('Søgefelt virker', async () => {
    await goTab('Katalog');
    const q = ge('catQ');
    if (!q) throw new Error('catQ ikke fundet');
    q.value = 'løb';
    q.dispatchEvent(new Event('input'));
    await sleep(200);
  }),
  test('Søg kan ryddes', async () => {
    ge('catQ').value = '';
    ge('catQ').dispatchEvent(new Event('input'));
    await sleep(150);
    if (!qsa('.cat-row:not(.cat-hdr)').length) throw new Error('Ingen rækker efter rydning');
  }),
  test('Skift til Fysisk træning rydder filter', async () => {
    // Set a search first
    ge('catQ').value = 'test';
    ge('catQ').dispatchEvent(new Event('input'));
    await sleep(100);
    click(qs('[data-ctab="fys"]'));
    await sleep(200);
    if (S().catTab !== 'fys') throw new Error('catTab ikke fys');
    if (S().catSearch !== '') throw new Error('Søgning ikke ryddet ved tabskift');
  }),
  test('Skift tilbage til Haltræning', async () => {
    click(qs('[data-ctab="hal"]'));
    await sleep(150);
    if (S().catTab !== 'hal') throw new Error('catTab ikke hal');
  }),
  test('"+ Ny øvelse" åbner modal', async () => {
    click(ge('newExBtn'));
    await waitFor(() => qs('.modal'));
    qs('.mclose')?.click();
    await sleep(100);
  }),
  test('Eksport-knap findes', async () => {
    if (!ge('exportMenuBtn') && !ge('exportCsvBtn')) throw new Error('Eksport-knap ikke fundet');
  }),
  test('Tag-filter kan klikkes', async () => {
    const tag = qs('[data-ctag]');
    if (!tag) return; // ingen tags = skip
    tag.click();
    await sleep(150);
    if (!S().catFilter.tags.length) throw new Error('Tag ikke tilføjet');
    tag.click();
    await sleep(100);
  }),
]);

suite('Årshjul', [
  test('Kvartaler vises', async () => {
    await goTab('Årshjul');
    await waitFor(() => qsa('[class*="q-"]').length > 0);
  }),
  test('Tema-input kan udfyldes', async () => {
    const inp = qs('.theme-inp, input[placeholder*="ema"]');
    if (!inp) throw new Error('Tema-input ikke fundet');
    inp.value = 'Testema';
    inp.dispatchEvent(new Event('input'));
    await sleep(100);
  }),
]);

suite('Trænerliste dropdown', [
  test('Åbn editor med draft', async () => {
    await createDraftTraining();
    if (!ge('tr-display')) throw new Error('tr-display ikke fundet');
  }),
  test('Dropdown åbner ved klik', async () => {
    click(ge('tr-display'));
    await sleep(150);
    if (ge('tr-dropdown').style.display === 'none') throw new Error('Dropdown ikke åben');
  }),
  test('Kan vælge træner uden at dropdown lukker', async () => {
    click(qs('[data-tr-opt]'));
    await sleep(200);
    if (ge('tr-dropdown').style.display === 'none') throw new Error('Dropdown lukkede ved valg');
  }),
  test('Valgt træner vises som pill', async () => {
    const pills = ge('tr-display').querySelectorAll('span[style*="background"]');
    if (!pills.length) throw new Error('Ingen pills i tr-display');
  }),
  test('Dropdown lukker ved klik udenfor', async () => {
    appDoc.body.click();
    await sleep(200);
    if (ge('tr-dropdown').style.display !== 'none') throw new Error('Dropdown lukkede ikke');
  }),
]);

// ── Runner ────────────────────────────────────────────────────────────────────
async function runAll() {
  allResults = [];
  renderResults([]);
  document.getElementById('runBtn').disabled = true;

  for (const suite of suites) {
    for (const t of suite.tests) {
      // Clear any open modals between tests
      try {
        if (S().modal) { S().modal = null; appRender(); await sleep(80); }
      } catch {}

      const result = { suite: suite.name, name: t.name, status: 'running', err: null };
      allResults.push(result);
      renderResults(allResults);

      try {
        await t.fn();
        result.status = 'pass';
      } catch (e) {
        result.status = 'fail';
        result.err = e.message;
        // Try to recover
        try { S().modal = null; appRender(); await sleep(100); } catch {}
      }
      renderResults(allResults);
      await sleep(40);
    }
  }

  document.getElementById('runBtn').disabled = false;
  updateStats();
}

function updateStats() {
  document.getElementById('s-pass').textContent = '✓ ' + allResults.filter(r=>r.status==='pass').length;
  document.getElementById('s-fail').textContent = '✗ ' + allResults.filter(r=>r.status==='fail').length;
  document.getElementById('s-skip').textContent = '– ' + allResults.filter(r=>r.status==='skip').length;
}

function renderResults(results) {
  updateStats();
  const show = filterFail ? results.filter(r => r.status==='fail' || r.status==='running') : results;
  const suiteMap = {};
  for (const r of show) {
    if (!suiteMap[r.suite]) suiteMap[r.suite] = [];
    suiteMap[r.suite].push(r);
  }
  let html = '';
  for (const [sname, rs] of Object.entries(suiteMap)) {
    html += `<div class="suite"><div class="suite-title">${sname}</div>`;
    for (const r of rs) {
      const icon = {pass:'✓', fail:'✗', running:'…', skip:'–'}[r.status] || '–';
      html += `<div class="test"><span class="badge ${r.status}">${icon}</span><div class="test-name">${r.name}${r.err?`<div class="test-err">⚠ ${r.err}</div>`:''}</div></div>`;
    }
    html += '</div>';
  }
  if (!html) html = '<p style="color:#475569;font-size:13px;margin-top:20px;text-align:center;">Ingen resultater</p>';
  resultsEl.innerHTML = html;
  resultsEl.querySelector('.badge.running')?.scrollIntoView({block:'nearest'});
}

document.getElementById('runBtn').addEventListener('click', runAll);
document.getElementById('clearBtn').addEventListener('click', () => { allResults = []; renderResults([]); });
document.getElementById('filterFail').addEventListener('click', function() {
  filterFail = !filterFail;
  this.classList.toggle('active', filterFail);
  renderResults(allResults);
});
</script>
</body>
</html>
