<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Ajax U11 – Træningsplanlægger</title>
<meta name="version" content="__BUILD_TS__">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ajax Træning">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#111318; --bg2:#181c24; --bg3:#1e2330; --bg4:#252d3e;
    --border:#2a3248; --border2:#38435e;
    --accent:#C8102E; --accent2:#e02040; --accent-light:rgba(200,16,46,0.12);
    --green:#22c55e; --yellow:#f59e0b; --blue:#3b82f6; --purple:#8b5cf6;
    --text:#eef0f5; --text2:#8d97b0; --text3:#4d5878; --red:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
  #app{display:flex;flex-direction:column;height:100vh}

  .topbar{background:var(--bg2);border-bottom:3px solid var(--accent);display:flex;align-items:center;padding:0 20px;height:54px;gap:0;flex-shrink:0}
  .topbar-logo{display:flex;align-items:center;gap:10px;margin-right:28px}
  .logo-text .club{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--accent);letter-spacing:.05em;text-transform:uppercase}
  .logo-text .team{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.12em;text-transform:uppercase}
  .nav-tabs{display:flex;height:100%}
  .nav-tab{background:none;border:none;color:var(--text3);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:0 16px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;margin-bottom:-3px;white-space:nowrap}
  .nav-tab:hover{color:var(--text2)}
  .nav-tab.active{color:#fff;border-bottom-color:var(--accent)}
  .sync-indicator{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
  .sync-dot.ok{background:var(--green)}
  .sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
  .sync-dot.err{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .content{flex:1;overflow-y:auto;padding:24px}

  .card{background:var(--bg2);border:1px solid var(--border);border-radius:8px}
  .card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .card-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text2)}
  .card-body{padding:16px}

  .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:5px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
  .btn-secondary{background:var(--bg3);border:1px solid var(--border2);color:var(--text)}.btn-secondary:hover{background:var(--bg4)}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
  .btn-danger{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}.btn-danger:hover{background:rgba(239,68,68,.22)}
  .btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:2px 7px;font-size:11px}.btn-icon{padding:5px 7px}

  input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:8px 11px;font-family:'DM Sans',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  select option{background:var(--bg3)}
  label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase}
  .form-group{margin-bottom:13px}
  .form-row{display:grid;gap:10px}

  .stars{display:inline-flex;gap:3px}
  .star{cursor:pointer;font-size:18px;color:var(--text3);transition:color .1s;line-height:1}
  .star.filled{color:var(--yellow)}
  .tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:500;background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
  .tags-wrap{display:flex;flex-wrap:wrap;gap:4px}

  .sc-fysisk{--sc:#f59e0b}.sc-opvarmning{--sc:#22c55e}.sc-afleveringer{--sc:#3b82f6}
  .sc-kontra{--sc:#C8102E}.sc-teknik{--sc:#8b5cf6}.sc-spil{--sc:#06b6d4}
  .sc-keeper{--sc:#ec4899}.sc-forsvar{--sc:#f97316}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(0,0,0,.7);display:flex;flex-direction:column}
  .modal-lg{max-width:900px}.modal-sm{max-width:440px}
  @media(max-width:640px){.modal-overlay{padding:0!important;align-items:flex-end!important}.modal,.modal-sm,.modal-lg{max-width:100%!important;width:100%!important;border-radius:16px 16px 0 0!important;max-height:92vh!important;overflow-y:auto!important;margin:0!important}}
  .modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.04em}
  .modal-body{padding:20px}
  .modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .flex-row{display:flex;align-items:center;gap:8px}
  .flex-between{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .pill-group{display:flex;flex-wrap:wrap;gap:6px}
  .pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s}
  .pill:hover{border-color:var(--accent);color:var(--text)}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
  .divider{border:none;border-top:1px solid var(--border);margin:14px 0}
  ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  .empty{text-align:center;padding:40px 20px;color:var(--text3)}
  .empty-icon{font-size:36px;margin-bottom:10px}
  .list-item{border:1px solid var(--border);border-radius:6px;background:var(--bg3);padding:12px 14px;margin-bottom:8px;transition:border-color .15s;cursor:pointer}
  .list-item:hover{border-color:var(--border2)}
  .list-title{font-weight:600;font-size:14px;margin-bottom:3px}
  .list-meta{color:var(--text2);font-size:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .prog-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
  .prog-fill{height:100%;border-radius:2px;transition:width .3s}
  .mins-ok{color:var(--green)}.mins-warn{color:var(--yellow)}.mins-over{color:var(--red)}
  .sec-block{border:1px solid var(--border);border-left:3px solid var(--sc,var(--accent));border-radius:6px;margin-bottom:10px;overflow:hidden}
  .sec-block-head{padding:9px 13px;background:var(--bg3);display:flex;align-items:center;gap:8px}
  .sec-block-body{padding:12px;background:var(--bg2)}
  .sec-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--sc,var(--text))}
  .sec-mins{font-size:12px;color:var(--text2);margin-left:auto}
  .ex-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;margin-bottom:5px}
  .ex-row-name{flex:1;font-size:13px}
  .mins-inp{width:60px;flex-shrink:0;padding:5px 8px}
  .parallel-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--purple);font-weight:600;text-transform:uppercase;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);padding:2px 6px;border-radius:3px}
  .q-card{border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .q-head{padding:12px 16px;display:flex;align-items:center;gap:12px}
  .q-num{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;line-height:1}
  .q-body{padding:14px;background:var(--bg2)}
  .theme-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;margin-bottom:5px}
  .theme-inp{flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
  .theme-inp::placeholder{color:var(--text3)}
  .loc-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
  .loc-valby{border-color:rgba(200,16,46,.4);color:#ff8096;background:rgba(200,16,46,.08)}
  .loc-bavnehoj{border-color:rgba(59,130,246,.4);color:#93c5fd;background:rgba(59,130,246,.08)}
  .loc-dybboel{border-color:rgba(34,197,94,.4);color:#86efac;background:rgba(34,197,94,.08)}
  .toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:6px}
  .toast{padding:10px 16px;border-radius:5px;font-size:13px;font-weight:500;animation:toastIn .2s ease;border-left:3px solid;min-width:220px}
  .toast-ok{background:#052e16;border-color:var(--green);color:#86efac}
  .toast-err{background:#450a0a;border-color:var(--red);color:#fca5a5}
  .toast-info{background:#1e3a5f;border-color:var(--blue);color:#93c5fd}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .search-wrap{position:relative}.search-wrap input{padding-left:32px}
  .search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:14px}
  .subtabs{display:flex;margin-bottom:18px;border-bottom:1px solid var(--border)}
  .subtab{background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
  .subtab:hover{color:var(--text)}.subtab.active{color:var(--text);border-bottom-color:var(--accent)}
  .cat-row{display:grid;grid-template-columns:200px 1fr 100px 120px 50px 36px;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px}
  .cat-row:hover{background:var(--bg3);cursor:pointer}
  .cat-hdr{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;background:var(--bg3);cursor:default!important}
  .cat-hdr:hover{background:var(--bg3)}
  .arch-tbl{width:100%;border-collapse:collapse}
  .arch-tbl th{text-align:left;padding:9px 11px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
  .arch-tbl td{padding:11px 11px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
  .arch-tbl tr:hover td{background:var(--bg3)}
  .stars-sm{color:var(--yellow);font-size:12px;letter-spacing:1px}
  .drop-zone{border:2px dashed var(--border2);border-radius:8px;padding:36px;text-align:center;cursor:pointer;transition:all .2s}
  .drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:var(--accent-light)}
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text2)}
  .spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ex-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;font-size:12px;}
  .ex-check.checked{background:var(--green);border-color:var(--green);color:#fff;}
  .ex-row.done .ex-row-name>div{text-decoration:line-through;opacity:.45;}
  .sec-done-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--green);}
  .grp-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}
  .grp-border-A{border-left-color:#f59e0b!important}
  .grp-border-B{border-left-color:#8b5cf6!important}
  .grp-border-C{border-left-color:#06b6d4!important}
  .grp-border-D{border-left-color:#ec4899!important}
  .grp-border-E{border-left-color:#22c55e!important}
  .grp-border-F{border-left-color:#f97316!important}

  /* ── RESPONSIVE ─────────────────────────────────────────── */
  @media (max-width: 640px) {
    body{font-size:15px}
    .content{padding:12px}

    /* Topbar: taller for easier tapping */
    .topbar{padding:0 8px;height:52px}
    .topbar-logo .logo-text{display:none}
    .topbar-logo{margin-right:6px}

    /* Nav tabs: bigger touch targets */
    .nav-tab{padding:0 11px;font-size:13px;height:52px;min-width:44px}
    .sync-indicator span{display:none}

    /* Editor: stack cards vertically */
    .editor-grid{grid-template-columns:1fr !important}
    .info-grid{grid-template-columns:1fr !important}

    /* Årshjul: single column */
    .aarshjul-grid{grid-template-columns:1fr !important}

    /* Theme text truncation fix */
    .theme-inp{font-size:14px}
    .q-num{font-size:24px}

    /* Section header: wrap on small screens, bigger tap targets */
    .sec-block-head{flex-wrap:wrap;gap:6px;padding:10px 10px}
    .sec-label{font-size:13px}

    /* Buttons: minimum 44px touch target height */
    .btn{min-height:38px;font-size:14px}
    .btn-sm{min-height:34px;font-size:13px;padding:5px 11px}
    .btn-xs{min-height:28px;font-size:12px;padding:3px 8px}

    /* Editor header: evenly distribute buttons on mobile */
    #cancelBtn{flex-shrink:0}
    #saveTBtn{flex-shrink:0}

    /* Inputs larger on mobile */
    input,select,textarea{font-size:16px;padding:10px 12px} /* 16px prevents iOS zoom */
    label{font-size:12px}

    /* Catalog table: hide description and stars cols on mobile */
    .cat-row{grid-template-columns:1fr 36px 36px !important;gap:4px}
    .cat-col-desc,.cat-col-stars,.cat-col-tags,.cat-col-link{display:none}

    /* Archive table: simplify */
    .arch-tbl .hide-mobile{display:none}

    /* Modal mobile: handled above */
    .modal-body{padding:14px}
    .modal-title{font-size:15px}

    /* Training card buttons stack */
    .tcard-actions{flex-direction:column;align-items:stretch}
    .tcard-actions .btn{justify-content:center}

    /* Pills: bigger */
    .pill{padding:7px 13px;font-size:13px}
  }

  @media (max-width: 480px) {
    .nav-tab{padding:0 8px;font-size:12px}
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ─── STATIC DATA ──────────────────────────────────────────────────────────────
const TRAINERS  = ['Alexandra','Claus','Peder','Elma','Naya','Salli'];
const LOCATIONS = ['Valby','Bavnehøj','Dybbøl'];
const LOC_CLS   = {'Valby':'loc-valby','Bavnehøj':'loc-bavnehoj','Dybbøl':'loc-dybboel'};
const SECTIONS  = [
  {id:'fysisk',       label:'Fysisk træning',    color:'#f59e0b',cls:'sc-fysisk'},
  {id:'opvarmning',   label:'Opvarmning',         color:'#22c55e',cls:'sc-opvarmning'},
  {id:'afleveringer', label:'Afleveringer',        color:'#3b82f6',cls:'sc-afleveringer'},
  {id:'kontra',       label:'Kontra',              color:'#C8102E',cls:'sc-kontra'},
  {id:'teknik',       label:'Teknik & afslutning', color:'#8b5cf6',cls:'sc-teknik'},
  {id:'spil',         label:'Spil & taktik',       color:'#06b6d4',cls:'sc-spil'},
  {id:'keeper',       label:'Keepertræning',        color:'#ec4899',cls:'sc-keeper'},
  {id:'forsvar',      label:'Forsvarstræning',      color:'#f97316',cls:'sc-forsvar'},
];
const DEFAULT_SECTION_TYPES = [
  {id:'fysisk',       label:'Fysisk træning',    color:'#f59e0b', cls:'sc-fysisk',
   tags:['plyometrik','eksplosion','styrke','hurtighed'], themes:[], required:false},
  {id:'opvarmning',   label:'Opvarmning',         color:'#22c55e', cls:'sc-opvarmning',
   tags:['opvarmning','leg','stafet','tvekamp','småspil'], themes:[], required:true},
  {id:'afleveringer', label:'Afleveringer',        color:'#3b82f6', cls:'sc-afleveringer',
   tags:['aflevering','afleveringer','sammenspil','hurtighed'], themes:[], required:true},
  {id:'kontra',       label:'Kontra',              color:'#C8102E', cls:'sc-kontra',
   tags:['kontra','returløb'], themes:[], required:false},
  {id:'teknik',       label:'Teknik & afslutning', color:'#8b5cf6', cls:'sc-teknik',
   tags:['skud','finter','duel','faldteknik','teknik'], themes:[], required:false},
  {id:'spil',         label:'Spil & taktik',       color:'#06b6d4', cls:'sc-spil',
   tags:['sammenspil','beslutning','taktik','kamp','overgang'], themes:[], required:false},
  {id:'keeper',       label:'Keepertræning',        color:'#ec4899', cls:'sc-keeper',
   tags:['keeper'], themes:[], required:false},
  {id:'forsvar',      label:'Forsvarstræning',      color:'#f97316', cls:'sc-forsvar',
   tags:['forsvar','taktik'], themes:[], required:false},
];

// Live accessor - use KV-stored types if available, else defaults
function getSectionTypes() {
  return (S.sectionTypes && S.sectionTypes.length) ? S.sectionTypes : DEFAULT_SECTION_TYPES;
}

const QUARTERS = [
  {id:'Q2a',label:'Q2',months:'Maj – Jun',color:'#22c55e',season:'Sæsonstart'},
  {id:'Q3', label:'Q3',months:'Aug – Sep',color:'#3b82f6',season:'Efterår'},
  {id:'Q4', label:'Q4',months:'Okt – Dec',color:'#8b5cf6',season:'Vinter'},
  {id:'Q1', label:'Q1',months:'Jan – Mar',color:'#f59e0b',season:'Forår'},
  {id:'Q5', label:'Q5',months:'Apr',color:'#ec4899',season:'Overgangsperiode'},

  if (body !== null) opts.body = JSON.stringify(body);
  const res = await fetch(url + path, opts);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function kvLoad() {
  const data = await kvFetch('/db');
  return data || {};
}

async function kvSave(patch) {
  // Read-modify-write: load current, merge patch, save back
  let current = {};
  try { current = await kvFetch('/db'); } catch(e) {}
  const merged = { ...current, ...patch };
  await kvFetch('/db', 'POST', merged);
}

function catalogToRows(exercises) {
  return [
    ['navn','beskrivelse','stjærner','tags','varianter','link','katalog','kategori','id','aldersgruppe','vejledende minutter'],
    ...exercises.map(e => [
      e.name||'', e.description||'', e.stars||0,
      (e.tags||[]).join(';'), e.variants||'', e.link||'',
      e.catalog||'hal', e.category||'', e.id||'',
      (Array.isArray(e.aldersgrupper)?e.aldersgrupper.join(';'):(e.aldersgrupper||'')),
      e.defaultMins||'',
    ])
  ];
}

function rowsToCatalog(rows, defaultCatalog) {
  if (!rows || rows.length < 2) return null;
  const header = rows[0].map(h => (h||'').toLowerCase().trim());
  const idx = k => header.indexOf(k);
  return rows.slice(1).map(r => ({
    id:           r[idx('id')]          || uid(),
    name:         r[idx('navn')]        || '',
    description:  r[idx('beskrivelse')] || '',
    stars:        parseInt(r[idx('stjærner')]||r[idx('stjerner')])||0,
    tags:         (r[idx('tags')]||'').split(';').map(x=>x.trim()).filter(Boolean),
    variants:     r[idx('varianter')]   || '',
    link:         r[idx('link')]        || '',
    catalog:      r[idx('katalog')]     || defaultCatalog,
    category:     r[idx('kategori')]    || '',
    aldersgrupper:(r[idx('aldersgruppe')]||'').split(';').map(x=>x.trim()).filter(Boolean),
    defaultMins:parseInt(r[idx('vejledende minutter')]||r[idx('vejledende_minutter')]||'')||null,
  })).filter(e => e.name);
}

// ─── SYNC ─────────────────────────────────────────────────────────────────────
let saveTimer = null;
function scheduleSave(type) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => pushToKV(type), 1500);
}

async function pushToKV(type) {
  S.syncStatus = 'syncing'; updateSyncUI();
  try {
    const patch = {};
    if (type === 'templates' || type === 'all') patch.templates = S.templates || [];
    if (type === 'users'     || type === 'all') patch.users     = S.users || [];
    if (type === 'trainings' || type === 'all') patch.trainings = S.trainings;
    if (type === 'quarters'  || type === 'all') patch.quarters  = S.quarters;
    if (type === 'hal'       || type === 'all') patch.hal       = S.halCatalog;
    if (type === 'fys'       || type === 'all') patch.fys       = S.fysCatalog;
    if (type === 'sectionTypes' || type === 'all') patch.sectionTypes = S.sectionTypes;
    if (type === 'sectionTypes' || type === 'all') patch.sectionTypes = S.sectionTypes;
    await kvSave(patch);
    S.syncStatus = 'ok'; updateSyncUI();
  } catch(e) {
    S.syncStatus = 'err'; updateSyncUI();
    toast('Synkronisering fejlede: ' + e.message, 'err');
  }
}

async function loadFromKV() {
  S.syncStatus = 'loading'; render();
  try {
    const data = await kvLoad();
    // Helper: parse value if it's a double-encoded JSON string
    const parse = v => (typeof v === 'string') ? JSON.parse(v) : v;
    if (data.templates) S.templates = parse(data.templates);
    if (data.users)     S.users     = parse(data.users);
    if (data.trainings) S.trainings = parse(data.trainings);
    if (data.quarters) {
      const quarters = parse(data.quarters);
      S.quarters = QUARTERS.map(q => {
        const saved = quarters.find(sq => sq.id === q.id);
        return saved ? {...q, themes: saved.themes || ['','']} : {...q, themes: ['','']};
      });
    }
    if (data.sectionTypes) S.sectionTypes = parse(data.sectionTypes);
    const hal = data.hal ? parse(data.hal) : null;
    const fys = data.fys ? parse(data.fys) : null;
    if (hal && hal.length) { S.halCatalog = hal; }
    else { await pushToKV('hal'); toast('Haltræningskatalog gemt i KV', 'info'); }
    if (fys && fys.length) { S.fysCatalog = fys; }
    else { await pushToKV('fys'); toast('Fysisk træningskatalog gemt i KV', 'info'); }
    S.syncStatus = 'ok';
  } catch(e) {
    S.syncStatus = 'err';
    toast('Kunne ikke forbinde til Worker: ' + e.message, 'err');
  }
  render();
}

function updateSyncUI() {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLbl');
  if (!dot || !lbl) return;
  const map = { ok:['ok','Synkroniseret'], syncing:['syncing','Gemmer…'], err:['err','Fejl'], loading:['syncing','Indlæser…'] };
  const [cls, txt] = map[S.syncStatus] || ['',''];
  dot.className = 'sync-dot ' + cls;
  lbl.textContent = txt;
}

    </div>

}

function flushSecMins() {
  if (!S.draft) return;
  document.querySelectorAll('[data-secmins]').forEach(inp => {
    const si = +inp.dataset.secmins;
    if (S.draft.sections[si] != null) S.draft.sections[si].mins = parseInt(inp.value) || 0;
  });
}
function renderSecs() {
  flushSecMins();
  const wrap = document.getElementById('secs-wrap');
  if (!wrap || !S.draft) return;
  const secs = S.draft.sections || [];
  const scrollY = window.scrollY;
  wrap.innerHTML = secs.map((s,si) => html_sec(s,si)).join('')
    + (!secs.length ? '<div class="empty" style="padding:28px;"><p>Ingen sektioner – klik &quot;+ Tilføj sektion&quot;</p></div>' : '');
  if (scrollY > 0) requestAnimationFrame(() => window.scrollTo({top: scrollY, behavior: 'instant'}));
}

function html_sec(sec,si) {
  const def=getSectionTypes().find(s=>s.id===sec.type)||SECTIONS.find(s=>s.id===sec.type)||SECTIONS[0];
  const collapsed=sec.collapsed||false;
  const exCount=(sec.exercises||[]).length;
  return `<div class="sec-block ${def.cls}${sec.group?` grp-border-${sec.group}`:''}" data-si="${si}">
    <div class="sec-block-head" style="cursor:pointer;" data-collapse="${si}">
      <div style="display:flex;flex-direction:column;gap:1px;flex-shrink:0;">
        <button class="btn btn-ghost btn-xs" style="padding:1px 4px;font-size:10px;line-height:1;${si===0?'opacity:.25;cursor:default;':''}" data-movesec="${si}-up" ${si===0?'disabled':''}>▲</button>
        <button class="btn btn-ghost btn-xs" style="padding:1px 4px;font-size:10px;line-height:1;${si===(S.draft?.sections||[]).length-1?'opacity:.25;cursor:default;':''}" data-movesec="${si}-down" ${si===(S.draft?.sections||[]).length-1?'disabled':''}>▼</button>
      </div>
      <span style="color:var(--text3);font-size:11px;transition:transform .2s;display:inline-block;transform:${collapsed?'rotate(-90deg)':'rotate(0deg)'};">▾</span>
      <span class="sec-label" style="color:${def.color};">${def.label}</span>
      ${(()=>{const exs=sec.exercises||[];const done=exs.filter(e=>e.done).length;if(!exs.length)return '';if(done===exs.length)return '<span class="sec-done-badge">✓ Færdig</span>';return `<span style="font-size:11px;color:var(--text3);">${done}/${exs.length}</span>`;})()}
      ${sec.group?grpBadge(sec.group):''}
      ${collapsed?`<span style="font-size:13px;color:var(--text2);">${exCount} øvelse${exCount!==1?'r':''}</span><span style="font-size:15px;font-weight:700;color:var(--text);margin-left:6px;">${sec.mins||'–'} <span style="font-size:12px;font-weight:500;color:var(--text2);">min</span></span>`:''}
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;${collapsed?'display:none;':''}" onclick="event.stopPropagation()">
        <input type="number" class="mins-inp" min="1" max="240" value="${sec.mins||''}" placeholder="–" data-secmins="${si}" style="width:52px;font-size:15px;font-weight:700;text-align:center;padding:4px 6px;" title="Minutter til denne sektion">
        <span style="font-size:13px;font-weight:600;color:var(--text2);">min</span>
      </div>
      <select class="btn btn-ghost btn-xs" data-grpsel="${si}" style="padding:3px 4px;font-size:11px;${collapsed?'display:none;':''}" onclick="event.stopPropagation()" title="Parallel gruppe">
        <option value="">Gruppe –</option>
        ${GROUPS.map(g=>`<option value="${g}" ${sec.group===g?'selected':''}>${g}</option>`).join('')}
      </select>
      <button class="btn btn-ghost btn-xs" data-aisec-suggest="${si}" style="border-color:var(--purple);color:var(--purple);${collapsed?'display:none;':''}" title="AI forslag til denne sektion">✨</button>
      <button class="btn btn-secondary btn-xs" data-addex="${si}" style="${collapsed?'display:none;':''}">+ Øvelse</button>
      <button class="btn btn-danger btn-xs" data-delsec="${si}" onclick="event.stopPropagation()">✕</button>
    </div>
    ${collapsed?'':`<div class="sec-block-body" id="sbd-${si}">
      ${(sec.exercises||[]).map((ex,ei)=>html_exrow(ex,si,ei)).join('')}
      ${!exCount?`<p style="color:var(--text3);font-size:12px;">Ingen øvelser</p>`:''}
    </div>`}
  </div>`;
}

function html_exrow(ex,si,ei) {
  const all=S.halCatalog.concat(S.fysCatalog);
  const def=all.find(c=>c.id===ex.exerciseId);
  const name=def?def.name:(ex.customName||'Fri øvelse');
  const tags=def?(def.tags||[]):[];
  const sec=S.draft?.sections[si];
  const total=(sec?.exercises||[]).length;
  return `<div class="ex-row${ex.done?' done':''}">
    <span class="ex-check${ex.done?' checked':''}" data-excheck="${si}-${ei}" title="Afkryds øvelse">${ex.done?'✓':''}</span>
    <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0;">
      <button class="btn btn-ghost btn-xs" style="padding:1px 5px;font-size:11px;line-height:1;${ei===0?'opacity:.25;cursor:default;':''}" data-moveex="${si}-${ei}-up" ${ei===0?'disabled':''}>▲</button>
      <button class="btn btn-ghost btn-xs" style="padding:1px 5px;font-size:11px;line-height:1;${ei===total-1?'opacity:.25;cursor:default;':''}" data-moveex="${si}-${ei}-down" ${ei===total-1?'disabled':''}>▼</button>
    </div>
    <div class="ex-row-name" style="flex:1;">
      <div style="font-weight:500;line-height:1.3;cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;" data-exdetail="${ex.exerciseId||''}">${esc(name)}</div>
      ${tags.length?`<div class="tags-wrap" style="margin-top:3px;">${tags.map(tg=>`<span class="tag">${esc(tg)}</span>`).join('')}</div>`:''}
    </div>
    <button class="btn btn-danger btn-xs" data-delex="${si}-${ei}">✕</button>
  </div>`;
}

    <div class="cat-row" data-catdetail="${ex.id}">
      <div style="font-weight:600;font-size:13px;">${esc(ex.name)}</div>
      <div class="cat-col-desc" style="font-size:12px;color:var(--text2);">${ex.description?esc(ex.description.substring(0,80))+(ex.description.length>80?'…':''):(ex.variants?esc(ex.variants.substring(0,80))+(ex.variants.length>80?'…':''):'')}</div>
      <div class="cat-col-stars stars-sm">${ex.stars?'★'.repeat(ex.stars)+'☆'.repeat(5-ex.stars):'–'}</div>
      <div class="cat-col-tags tags-wrap">${(ex.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}${(ex.tags||[]).length>3?`<span class="tag">+${ex.tags.length-3}</span>`:''}</div>

}

            <div id="exportXlsxBtn" style="padding:9px 14px;cursor:pointer;font-size:13px;" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">⬇ Excel (.xls)</div>

      </div>
    </div>
    <div class="subtabs">
      <button class="subtab${S.catTab==='hal'?' active':''}" data-ctab="hal">Haltræning <span style="color:var(--text3);font-size:11px;">(${S.halCatalog.length})</span></button>
      <button class="subtab${S.catTab==='fys'?' active':''}" data-ctab="fys">Fysisk træning <span style="color:var(--text3);font-size:11px;">(${S.fysCatalog.length})</span></button>

    ${allTags.length?`<div style="margin-bottom:12px;"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Tags</div><div class="pill-group">${allTags.map(t=>`<button class="pill btn-sm${tf.includes(t)?' active':''}" data-ctag="${esc(t)}">${esc(t)}</button>`).join('')}</div></div>`:''}

// ─── ARKIV ────────────────────────────────────────────────────────────────────

    if(sf&&(t.stars||0)<sf) return false;
    if(tf&&!(t.trainers||[]).includes(tf)) return false;
    if(lf&&t.location!==lf) return false;
    return true;
  }).sort((a,b)=>b.date>a.date?1:-1);
  return `<div style="max-width:960px;margin:0 auto;">
    <div class="flex-between" style="margin-bottom:18px;flex-wrap:wrap;gap:10px;">

      <select id="archLoc"  style="width:130px;"><option value="">Alle steder</option>${LOCATIONS.map(l=>`<option value="${l}" ${lf===l?'selected':''}>${l}</option>`).join('')}</select>
      <select id="archTr"   style="width:140px;"><option value="">Alle trænere</option>${TRAINERS.map(tr=>`<option value="${tr}" ${tf===tr?'selected':''}>${tr}</option>`).join('')}</select>
    </div>
    ${filtered.length===0?`<div class="empty"><div class="empty-icon">📁</div><p>Ingen arkiverede træninger</p></div>`
      :`<table class="arch-tbl"><thead><tr><th>Dato</th><th>Træning</th><th class="hide-mobile">Sted</th><th class="hide-mobile">Varighed</th><th class="hide-mobile">Trænere</th><th>Vurdering</th><th></th></tr></thead><tbody>
      ${filtered.map(t=>`<tr>
        <td style="color:var(--text2);white-space:nowrap;">${t.date||'–'}</td>
        <td><div style="font-weight:500;">${trainingLabel(t)}</div>${t.focusPoints?`<div style="font-size:11px;color:var(--text2);">🎯 ${esc(t.focusPoints)}</div>`:''}</td>
        <td class="hide-mobile">${t.location?`<span class="loc-chip ${LOC_CLS[t.location]||''}">${t.location}</span>`:''}</td>
        <td class="hide-mobile"><span style="background:var(--bg4);padding:2px 6px;border-radius:3px;font-size:11px;">${durMin(t.startTime,t.endTime)} min</span></td>
        <td class="hide-mobile" style="white-space:nowrap;">${(t.trainers||[]).map(tr=>`<span style="background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd;padding:1px 5px;border-radius:3px;font-size:11px;">${tr}</span>`).join(' ')}</td>

        <td style="white-space:nowrap;">
          <button class="btn btn-secondary btn-xs" data-clone="${t.id}">Kopi</button>
          <button class="btn btn-ghost btn-xs" data-restore="${t.id}">Genskab</button>

      </tr>`).join('')}</tbody></table>`}

  if(m.type==='hsDatePick')  return html_m_hs_datepick();
  if(m.type==='hsSettings') return html_m_hs_settings();
  if(m.type==='hsLoading')  return html_m_hs_loading();
  if(m.type==='hsPicker')   return html_m_hs_picker();

function mhead(title){return `<div class="modal-header"><span class="modal-title">${title}</span><button class="btn btn-ghost btn-sm" id="mclose">✕</button></div>`;}

function renderPickList(f, si) {
  if(f.length===0) return `<div class="empty" style="padding:20px;"><p>Ingen resultater</p></div>`;
  return f.slice(0,80).map(ex=>{
    const hasDesc = ex.description && ex.description.trim();
    return `<div class="list-item" style="margin-bottom:5px;padding:0;" data-pickex="${ex.id}" data-si="${si}">
      <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;">
        <div style="flex:1;min-width:0;">
          <div class="list-title">${esc(ex.name)}</div>
          <div class="list-meta">${(ex.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
        </div>
        ${hasDesc ? `<button class="btn btn-ghost btn-xs" data-toggledesc="${esc(ex.id)}" onclick="event.stopPropagation();const d=document.getElementById('desc-${esc(ex.id)}');const btn=this;if(d.style.display==='none'){d.style.display='block';btn.textContent='▾';}else{d.style.display='none';btn.textContent='▸';}" style="flex-shrink:0;font-size:11px;width:22px;padding:0;">▸</button>` : '<span style="width:22px;flex-shrink:0;"></span>'}
      </div>
      ${hasDesc ? `<div id="desc-${esc(ex.id)}" style="display:none;padding:0 12px 10px 12px;font-size:12px;color:var(--text2);line-height:1.5;border-top:1px solid var(--border);">${esc(ex.description)}</div>` : ''}
    </div>`;
  }).join('')
  + (f.length>80?`<div style="text-align:center;color:var(--text3);font-size:12px;padding:8px;">Viser 80 af ${f.length}</div>`:'');
}

function html_m_pickex() {
  const si=S.modal.si, q=(S.modal.q||'').toLowerCase();
  const tf=S.modal.tags||[];
  const all=S.halCatalog.concat(S.fysCatalog);
  const allTags=[...new Set(all.flatMap(e=>e.tags||[]))].sort();
  const f=all.filter(ex=>{
    if(q&&!ex.name.toLowerCase().includes(q)&&!(ex.tags||[]).some(t=>t.toLowerCase().includes(q)))return false;
    if(tf.length&&!tf.every(t=>(ex.tags||[]).includes(t)))return false;
    return true;
  });
  return mwrap(mhead('Vælg øvelse')+`<div class="modal-body">
    <div class="search-wrap" style="margin-bottom:8px;"><span class="search-ico">🔍</span><input id="exPickQ" value="${esc(S.modal.q||'')}" placeholder="Søg på navn eller tag…" autofocus></div>
    <div class="pill-group" style="margin-bottom:10px;" id="exPickTags">${allTags.map(t=>`<button class="pill btn-xs${tf.includes(t)?' active':''}" data-picktag="${esc(t)}">${esc(t)}</button>`).join('')}</div>
    <div style="max-height:360px;overflow-y:auto;" id="exPickList">
      ${all.length===0?`<div class="empty" style="padding:20px;"><p>Ingen øvelser – importer katalog</p></div>`:renderPickList(f,si)}
    </div>
    <hr class="divider"><button class="btn btn-ghost btn-sm" data-custex="${si}">+ Tilføj fri øvelse</button>
  </div>`,'modal-lg');
}

// ─── AI BESKRIVELSE ───────────────────────────────────────────────────────────
async function generateAIDescription() {
  const nameEl = document.getElementById('ex-n') || document.getElementById('cex-n');
  const descEl = document.getElementById('ex-d') || document.getElementById('cex-d');
  const tagsEl = document.getElementById('ex-t');
  const statusEl = document.getElementById('ai-gen-status');
  const btn = document.getElementById('ai-gen-btn');

  const name = nameEl?.value?.trim();
  if (!name) { toast('Skriv et øvelsesnavn først', 'err'); return; }

  const tags = tagsEl?.value?.trim() || '';
  const existing = descEl?.value?.trim() || '';

  btn.disabled = true;
  btn.textContent = '⏳ Genererer…';
  if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = 'Henter beskrivelse fra AI…'; }

  try {
    const ag = S.ageGroup || 'U11';
  const ageMap = {'U9':'8-9','U11':'10-11','U13':'12-13','U15':'14-15','U17':'16-17','U19':'18-19'};
  const ageLbl = ageMap[ag] || '10-11';
  const prompt = `Du er håndboldtræner for ${ag} (${ageLbl} årige). Skriv en kort, præcis beskrivelse af håndboldøvelsen "${name}"${tags ? ` (tags: ${tags})` : ''}${existing ? ` Eksisterende beskrivelse til inspiration: "${existing}"` : ''}.

Krav:
- 2-4 sætninger på dansk
- Beskriv hvad spillerne gør konkret
- Nævn hvad øvelsen træner
- Passende til ${ag}-niveau (${ageLbl} årige)
- Ingen overskrift, kun selve beskrivelsen`;

    const response = await fetch((S.aiWorkerUrl||'https://ajax-ai-proxy.claus-takman.workers.dev')+'/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      let errMsg = 'API fejl: ' + response.status;
      try { const errData = await response.json(); errMsg += ' – ' + (errData.error?.message || JSON.stringify(errData)); } catch(e){}
      throw new Error(errMsg);
    }
    const data = await response.json();
    const text = data.content?.find(b => b.type === 'text')?.text?.trim();
    if (!text) throw new Error('Tomt svar');

    if (descEl) descEl.value = text;
    if (statusEl) { statusEl.style.display = 'block'; statusEl.style.color = 'var(--green)'; statusEl.textContent = '✓ Beskrivelse genereret – tilpas efter behov'; }
    toast('Beskrivelse genereret ✨');
  } catch (err) {
    console.error(err);
    const isCredit = err.message?.toLowerCase().includes('credit') || err.message?.toLowerCase().includes('billing');
    const userMsg = isCredit
      ? 'Ingen AI-credits – gå til console.anthropic.com for at opgradere'
      : 'Kunne ikke generere beskrivelse. Prøv igen.';
    if (statusEl) {
      statusEl.style.display = 'block';
      statusEl.style.color = 'var(--red)';
      statusEl.innerHTML = isCredit
        ? '⚠️ Ingen credits – <a href="https://console.anthropic.com/settings/billing" target="_blank" style="color:var(--blue);">Opgrader her ↗</a>'
        : 'Kunne ikke generere beskrivelse. Prøv igen.';
    }
    toast(userMsg, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ Generer med AI';
  }
}

// ─── AI TRÆNINGSFORSLAG ───────────────────────────────────────────────────────

function html_m_ai_suggest() {
  const existingSecs = (S.draft&&S.draft.sections)||[];
  const trainingThemes = (S.draft&&S.draft.themes)||[];
  const allQuarterThemes = S.quarters.flatMap(q=>(q.themes||[]).filter(x=>x.trim()));
  // Merge: training themes first, then any quarter themes
  const activeThemes = [...new Set([...trainingThemes, ...allQuarterThemes])];

  let h = '<div class="modal-body">';
  h += '<p style="font-size:13px;color:var(--text2);margin-bottom:16px;">Angiv sektioner og tid – AI vælger øvelser der passer.</p>';

  // Temaer fra træningen (read-only info)
  if (activeThemes.length) {
    h += '<div class="form-group">';
    h += '<label>Temaer (fra træningen)</label>';
    h += '<div class="tags-wrap">';
    activeThemes.forEach(t => h += `<span class="tag">${esc(t)}</span>`);
    h += '</div></div>';
  }

  // Sektioner med minutter
  h += '<div class="form-group"><label>Sektioner & varighed</label>';
  h += '<div id="ai-sec-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;">';
  // Pre-fill: existing sections, or required sections + some defaults – but deduplicated by type
  const stypes = getSectionTypes();
  const requiredTypes = stypes.filter(st=>st.required).map(st=>st.id);
  let preFill;
  if (existingSecs.length) {
    preFill = existingSecs.map(s => ({type:s.type, mins:s.mins||15}));
    // Add any missing required types (prepend)
    requiredTypes.forEach(rid => {
      if (!preFill.some(s=>s.type===rid)) preFill.unshift({type:rid, mins:15});
    });
  } else {
    // Start with required sections, then add a couple of common ones – all unique
    const seen = new Set();
    preFill = [];
    requiredTypes.forEach(rid => { if(!seen.has(rid)){ seen.add(rid); preFill.push({type:rid, mins:15}); } });
    // Add teknik and spil as common extras if not already required

function validateAISections(sections) {

  return sections.map(sec => ({
    ...sec,
    exercises: (sec.exercises||[]).filter(ex => {
      if (!validIds.has(ex.exerciseId)) {
        console.warn('AI returned unknown exerciseId:', ex.exerciseId);
        return false;
      }
      return true;
    })
  })).filter(sec => sec.exercises.length > 0);
}

async function runAISuggest(secsMins, themesArg, vary) {
  // secsMins = [{type, mins}, ...]
  // Temaer tages altid fra selve træningen (ikke fra modal)
  const trainingThemes = (S.draft&&S.draft.themes)||[];
  const allQuarterThemes = S.quarters.flatMap(q=>(q.themes||[]).filter(x=>x.trim()));
  const themes = [...new Set([...trainingThemes, ...allQuarterThemes, ...(themesArg||[])])];

  // Håndhæv max én af hver sektionstype (behold første forekomst)
  const seenTypes = new Set();
  secsMins = secsMins.filter(s => {
    if (seenTypes.has(s.type)) return false;
    seenTypes.add(s.type);
    return true;
  });

  const all = S.halCatalog.concat(S.fysCatalog);

  // Recent exercise IDs to avoid (last 3 trainings)
  let recentIds = new Set();
  if (vary) {
    const recent = [...S.trainings]
      .filter(t=>!t.archived)
      .sort((a,b)=>b.date.localeCompare(a.date))
      .slice(0,3);
    recent.forEach(t => (t.sections||[]).forEach(s => (s.exercises||[]).forEach(e => recentIds.add(e.exerciseId))));
  }

  // Build catalog summary - only include relevant exercises per section type
  const secTypes = [...new Set(secsMins.map(s=>s.type))];
  // Build tag/theme mapping from getSectionTypes()
  const sectionTypeDefs = getSectionTypes();
  const tagMap = {};
  sectionTypeDefs.forEach(st => { tagMap[st.id] = st.tags || []; });

  // Build catalog summary with defaultMins (include exercise if it matches ANY requested section's tags)
  const catalogSummary = all
    .filter(e => {
      const eTags = e.tags||[];
      return secTypes.some(t => (tagMap[t]||[]).some(tag => eTags.includes(tag)));
    })
    .map(e => ({
      id: e.id,
      name: e.name,
      tags: (e.tags||[]).join(', '),
      stars: e.stars||0,
      defaultMins: e.defaultMins||10,
      recent: recentIds.has(e.id),
    }));

  // Build per-section catalog slices
  // Rule: exercise MUST match the section's own tags (strict).
  // Theme matching is used as a relevance SORT BOOST, not to add unrelated exercises.
  const secCatalogs = secsMins.map(s => {
    const stDef = sectionTypeDefs.find(x=>x.id===s.type);
    const secTags = stDef ? stDef.tags || [] : [];
    // Section-type-specific themes (from Settings) + training themes
    const secThemes = stDef ? stDef.themes || [] : [];
    const activeThemes = [...themes, ...secThemes];

    // Filter: MUST match section tags (strict tag filter = correct section type)
    let exercises = catalogSummary.filter(e => {
      const eTags = e.tags.split(', ').filter(Boolean);
      return secTags.some(tag => eTags.includes(tag));
    });

    // If section has no configured tags, fall back to theme matching as a last resort
    if (secTags.length === 0 && activeThemes.length > 0) {
      exercises = catalogSummary.filter(e => {
        const eTags = e.tags.split(', ').filter(Boolean);
        return activeThemes.some(th =>
          eTags.some(tag => tag.toLowerCase().includes(th.toLowerCase()) || th.toLowerCase().includes(tag.toLowerCase()))
        );
      });
    }

    // Sort: theme-matching exercises first, then by stars descending
    if (activeThemes.length > 0) {
      exercises = exercises.slice().sort((a, b) => {
        const aTheme = activeThemes.some(th => a.tags.split(', ').some(tag => tag.toLowerCase().includes(th.toLowerCase()) || th.toLowerCase().includes(tag.toLowerCase())));
        const bTheme = activeThemes.some(th => b.tags.split(', ').some(tag => tag.toLowerCase().includes(th.toLowerCase()) || th.toLowerCase().includes(tag.toLowerCase())));
        if (aTheme && !bTheme) return -1;
        if (!aTheme && bTheme) return 1;
        return (b.stars||0) - (a.stars||0);
      });
    }

    return {
      section: stDef ? stDef.label : s.type,
      type: s.type,
      mins: s.mins,
      exercises
    };
  });

  const prompt = `Du er assistent for en håndboldtræner for U11 piger (9-11 år).
Sammensæt en træning. For HVER sektion er der angivet præcis hvilke øvelser der må bruges.

${secCatalogs.map(sc => {
  const avgMins = sc.exercises.length > 0
    ? Math.round(sc.exercises.reduce((s,e)=>s+e.defaultMins,0)/sc.exercises.length)
    : 10;
  const maxEx = Math.max(1, Math.round(sc.mins / avgMins));
  return `## ${sc.section} (${sc.mins} min, maks ${maxEx} øvelse${maxEx>1?'r':''})
Tilgængelige øvelser: ${JSON.stringify(sc.exercises.map(e=>({id:e.id,name:e.name,stars:e.stars,defaultMins:e.defaultMins,recent:e.recent})))}`;
}).join('\n\n')}

Temaer: ${themes.length ? themes.join(', ') : 'ingen specifikke'}
Variation: ${vary ? 'Undgå recent:true øvelser hvis muligt' : 'Gentag gerne nylige øvelser'}

Returner KUN et JSON-array – ingen tekst før eller efter:
[{"type":"opvarmning","mins":15,"exercises":[{"exerciseId":"ID","mins":8},{"exerciseId":"ID","mins":7}]},...]

Regler:
- Brug KUN øvelser fra den pågældende sektions liste
- Overhold maks antal øvelser per sektion
- Brug defaultMins som udgangspunkt, juster så minutterne summerer til sektionens total
- Foretrræk høje stars
- Match temaer hvor muligt`;

  const aiUrl = S.aiWorkerUrl || lsLoad('aiWorkerUrl','');
  if (!aiUrl) throw new Error('AI Worker URL ikke sat – gå til Indstillinger');

  const resp = await fetch(aiUrl, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 2000,
      messages: [{role:'user', content: prompt}]
    })
  });

  if (!resp.ok) throw new Error('AI fejl: ' + resp.status);
  const data = await resp.json();
  const text = data.content?.[0]?.text || '';

  // Parse JSON from response
  const match = text.match(/\[[\s\S]*\]/);
  if (!match) throw new Error('AI returnerede ikke gyldigt JSON');
  return JSON.parse(match[0]);
}

let _hsAllActivities = [];
let _hsShowAll = false;

async function hsFetch(path) {
  const url = S.hsWorkerUrl;
  if (!url) throw new Error('Worker URL ikke sat – gå til indstillinger');
  const headers = { 'Accept': 'application/json' };
  if (S.hsAppToken) headers['X-Token'] = S.hsAppToken;
  const res = await fetch(url + path, { headers });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function hsExtractActivities(data, teamId, teamName) {
  let arr = [];
  if (Array.isArray(data)) { arr = data; }
  else if (data && typeof data === 'object') {
    for (const key of ['activities','items','data','results']) {
      if (Array.isArray(data[key])) { arr = data[key]; break; }
    }
    if (!arr.length) {
      for (const key of Object.keys(data)) {
        const v = data[key];
        if (Array.isArray(v) && v.length > 0 && v[0] && (v[0].starttime || v[0].id)) { arr = v; break; }
      }
    }
    if (!arr.length && (data.starttime || data.id)) arr = [data];
  }
  arr = arr.filter(a => a && (a.starttime || a.endtime || a.event_type_id));
  return arr.map(a => ({ ...a, _teamId: teamId, _teamName: teamName }));
}

function hsIsTraining(a) {
  return (a.name || a.title || '').toLowerCase().includes('tr\u00e6ning');
}

async function hsFetchActivities(fromDate, toDate) {
  S.modal = { type: 'hsLoading' }; render();
  try {
    const teamsData = await hsFetch('/teams');
    const teams = Array.isArray(teamsData) ? teamsData
      : (teamsData.teams || teamsData.data || Object.values(teamsData).find(v => Array.isArray(v)) || []);
    let all = [];
    for (const team of teams) {
      try {
        const qs = '?date=' + fromDate + (toDate ? '&to=' + toDate : '') + '&per_page=100';
        const raw = await hsFetch('/teams/' + team.id + '/activities' + qs);
        all = all.concat(hsExtractActivities(raw, team.id, team.name || team.title || ''));
      } catch(e) {}
    }
    _hsAllActivities = all;
    _hsShowAll = false;
    S.modal = { type: 'hsPicker' }; render();
  } catch(e) {
    S.modal = null; render();
    toast('Holdsport fejl: ' + e.message, 'err');
  }
}

    h += '<div style="font-weight:600;font-size:13px;">'+esc(name)+(already?' <span style="font-size:10px;color:var(--text3);font-weight:400;">dato findes</span>':'')+' </div>';
    h += '<div style="font-size:11px;color:var(--text2);margin-top:2px;">';
    if (date) h += fmtWday(date)+' '+fmtDay(date)+' '+fmtMon(date);
    if (time && time!=='00:00') h += ' · '+time;
    if (endTime && endTime!=='00:00') h += '–'+endTime;
    if (a.place) h += ' · '+esc(a.place);
    if (a._teamName) h += ' · '+esc(a._teamName);
    h += '</div></div></div>';
  }
  h += '</div></div>';
  h += '<div class="modal-footer" style="gap:6px;">';
  h += '<button class="btn btn-ghost mclose" style="flex:1;">Annuller</button>';
  h += '<button class="btn btn-ghost btn-xs" id="hs-settings-btn" style="font-size:11px;">⚙ Indstillinger</button>';
  h += '<button class="btn btn-primary" id="hs-import-btn" style="flex:1;">⬇ Opret valgte</button>';
  h += '</div>';
  window._hsShown = shown;
  return mwrap(mhead('Importer fra Holdsport') + h, 'modal-sm');
}

function hsImportSelected() {
  const shown = window._hsShown || [];
  const selected = [...document.querySelectorAll('.hs-cb:checked')]
    .map(cb => shown[parseInt(cb.dataset.idx)]).filter(Boolean);
  if (!selected.length) { toast('Ingen valgt', 'err'); return; }

  let count = 0;
  selected.forEach(a => {
    const raw  = a.starttime || '';
    const date = raw ? raw.split('T')[0] : '';
    const startTime = raw.includes('T') ? raw.split('T')[1].slice(0,5) : '';
    const endRaw = a.endtime || '';
    const endTime = endRaw.includes('T') ? endRaw.split('T')[1].slice(0,5) : '';
    const place = a.place || '';
    // Match location to known locations
    const loc = LOCATIONS.find(l => place.toLowerCase().includes(l.toLowerCase())) || '';
    S.trainings.push({
      id: uid(), date, startTime, endTime,
      location: loc, title: a.name || a.title || '',
      trainers: [], leadTrainer: '', sections: [], stars: 0,
      notes: place && !loc ? place : '',
    });
    count++;
  });

  scheduleSave('trainings');
  S.modal = null;
  toast('✓ ' + count + ' træning' + (count !== 1 ? 'er' : '') + ' oprettet');
  render();
}

// ─── AI SUGGEST BINDINGS ─────────────────────────────────────────────────────
document.addEventListener('click', async e => {
  // Per-section AI suggest button
  const aiSecSuggest = e.target.closest('[data-aisec-suggest]');
  if (aiSecSuggest && S.draft) {
    e.stopPropagation();
    requireUnlock(()=>{S.modal={type:'aiSecSuggest',si:+aiSecSuggest.dataset.aisecSuggest};render();});
    return;
  }
  // Whole-training AI suggest button
  if (e.target.closest('#aiSuggestBtn')) {
    requireUnlock(()=>{S.modal={type:'aiSuggest'};render();});
    return;
  }
  // Section pill toggle (in ai suggest modal)
  const secPill = e.target.closest('[data-aisec]');
  if (secPill && ge('ai-sec-picks')) { secPill.classList.toggle('active'); return; }
  // (theme pill toggles removed – themes are taken directly from the training)
  // Variation toggles
  if (e.target.closest('#ai-vary-yes')) { ge('ai-vary-yes')?.classList.add('active'); ge('ai-vary-no')?.classList.remove('active'); return; }
  if (e.target.closest('#ai-vary-no'))  { ge('ai-vary-no')?.classList.add('active'); ge('ai-vary-yes')?.classList.remove('active'); return; }
  if (e.target.closest('#aisec-vary-yes')) { ge('aisec-vary-yes')?.classList.add('active'); ge('aisec-vary-no')?.classList.remove('active'); return; }
  if (e.target.closest('#aisec-vary-no'))  { ge('aisec-vary-no')?.classList.add('active'); ge('aisec-vary-yes')?.classList.remove('active'); return; }
  // Add section row in suggest modal
  if (e.target.closest('#ai-sec-add')) {
    e.stopPropagation();
    const list = document.getElementById('ai-sec-list');
    if (!list) return;
    const i = list.querySelectorAll('.ai-sec-row').length;
    const div = document.createElement('div');
    div.className = 'ai-sec-row';
    div.style.cssText = 'display:flex;align-items:center;gap:8px;';
    div.innerHTML = `<select class="ai-sec-type" style="flex:1;">${getSectionTypes().map(s=>`<option value="${s.id}">${s.label}</option>`).join('')}</select><input type="number" class="ai-sec-mins" value="15" min="5" max="60" step="5" style="width:64px;text-align:center;"><span style="font-size:11px;color:var(--text2);">min</span><button class="btn btn-ghost btn-xs ai-sec-del" style="padding:2px 6px;color:var(--red);">✕</button>`;
    list.appendChild(div);
    return;
  }
  // Delete section row
  if (e.target.closest('.ai-sec-del')) {
    e.stopPropagation();
    e.target.closest('.ai-sec-row')?.remove();
    return;
  }
  // Generate whole-training suggestion
  if (e.target.closest('#ai-suggest-go')) {
    const rows = [...document.querySelectorAll('.ai-sec-row')];
    if (!rows.length) { toast('Tilføj mindst én sektion', 'err'); return; }
    let secsMins = rows.map(row => ({
      type: row.querySelector('.ai-sec-type')?.value || 'opvarmning',
      mins: parseInt(row.querySelector('.ai-sec-mins')?.value||15),
    }));
    // Always ensure required sections are present
    getSectionTypes().filter(st=>st.required).forEach(st => {
      if (!secsMins.some(s=>s.type===st.id)) secsMins.unshift({type:st.id, mins:15});
    });
    // Temaer tages fra træningen i runAISuggest – send tom liste herfra
    const vary = !ge('ai-vary-no')?.classList.contains('active');
    window._aiLastSecs=secsMins; window._aiLastThemes=[]; window._aiLastVary=vary;
    S.modal={type:'aiLoading'}; render();
    try { const sections=validateAISections(await runAISuggest(secsMins,[],vary)); S.modal={type:'aiResult',sections}; render(); }
    catch(err) { toast('AI fejl: '+err.message,'err'); S.modal={type:'aiSuggest'}; render(); }
    return;
  }
  // Generate per-section suggestion
  if (e.target.closest('#aisec-go')) {
    const btn = e.target.closest('#aisec-go');
    const si = +btn.dataset.si;
    const sec = S.draft?.sections[si];
    if (!sec) return;
    // Temaer tages fra træningen i runAISuggest – send tom liste herfra
    const vary = !ge('aisec-vary-no')?.classList.contains('active');
    const secsMins = [{type:sec.type, mins:sec.mins||20}];
    S.modal={type:'aiLoading'}; render();
    try {
      const sections = await runAISuggest(secsMins, themes, vary);
      if (sections&&sections[0]) {
        S.draft.sections[si].exercises = sections[0].exercises||[];
        renderSecs();
        toast('Øvelser genereret ✓');
      }
      S.modal=null; render();
    } catch(err) {
      toast('AI fejl: '+err.message,'err');
      S.modal=null; render();
    }
    return;
  }
  // Retry
  if (e.target.closest('#ai-retry')) {
    S.modal={type:'aiLoading'}; render();
    try { const sections=validateAISections(await runAISuggest(window._aiLastSecs||[],window._aiLastThemes||[],window._aiLastVary||false)); S.modal={type:'aiResult',sections}; render(); }
    catch(err) { toast('AI fejl: '+err.message,'err'); S.modal=null; render(); }
    return;
  }
  // Accept result
  if (e.target.closest('#ai-accept')) {
    const m=S.modal;
    if (m&&m.sections) { S.draft.sections=m.sections.map(s=>({...s,collapsed:false})); renderSecs(); toast('Træning opdateret ✓'); }
    S.modal=null; render();
    return;
  }
});

document.addEventListener('click', e => {

  // Delete
  const delBtn = e.target.closest('[data-sectype-del]');

    const types = getSectionTypes();
    types.splice(+delBtn.dataset.sectypeDel, 1);
    S.sectionTypes = types;
    scheduleSave('sectionTypes');
    toast('Sektionstype slettet');
    render();
    return;
  }
  // Tag toggle in edit modal
  const stTag = e.target.closest('[data-sttag]');
  if (stTag && document.getElementById('st-tags')) { stTag.classList.toggle('active'); return; }
  // Theme toggle in edit modal
  const stTheme = e.target.closest('[data-sttheme]');
  if (stTheme && document.getElementById('st-themes')) { stTheme.classList.toggle('active'); return; }
  // Save
  if (e.target.closest('#st-save')) {
    const btn = e.target.closest('#st-save');
    const idx = +btn.dataset.idx;
    const isNew = idx === -1;
    const label = document.getElementById('st-label')?.value?.trim();
    if (!label) { toast('Navn mangler', 'err'); return; }
    const color = document.getElementById('st-color')?.value || '#3b82f6';
    const tags = [...document.querySelectorAll('[data-sttag].active')].map(el=>el.dataset.sttag);
    const themes = [...document.querySelectorAll('[data-sttheme].active')].map(el=>el.dataset.sttheme);
    const required = document.getElementById('st-required')?.checked || false;
    const types = [...getSectionTypes()];
    if (isNew) {
      const rawId = document.getElementById('st-id')?.value?.trim();
      const id = rawId || label.toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,12) || ('st'+Date.now());
      const cls = 'sc-'+id;
      types.push({id, label, color, cls, tags, themes, required});
    } else {
      types[idx] = {...types[idx], label, color, tags, themes, required};
    }
    S.sectionTypes = types;
    scheduleSave('sectionTypes');
    toast('Sektionstype gemt ✓');
    S.modal = null; render();
    return;
  }
});

// ─── ROLE HELPERS ────────────────────────────────────────────────────────────
function userRole() { return (S.currentUser && S.currentUser.role) || 'guest'; }
function canEdit()  { return userRole() === 'trainer' || userRole() === 'admin'; }
function canAdmin() { return userRole() === 'admin'; }
function isAarshjulLocked() { return !canAdmin(); }

function requireRole(minRole, action) {
  const ok = minRole === 'trainer' ? canEdit() : canAdmin();
  if (ok) { action(); return; }
  if (!S.currentUser) { S.modal = { type: 'login', afterLogin: action }; render(); }
  else { toast('Du har ikke adgang til dette', 'err'); }
}
function requireUnlock(action) { requireRole('trainer', action); }

      if(user.pin !== pin){ if(errEl) errEl.textContent='Forkert PIN'; return; }
      S.currentUser = {id:user.id, name:user.name, role:user.role};
      lsSave('currentUser', S.currentUser);
      const after = window._loginAfter; window._loginAfter = null;
      S.modal = null; render();
      toast('Velkommen, '+user.name+' ✓');
      if(after) after();
      return;
    }
    // Allow Enter key in PIN field to submit
    if(e.target.closest('#login-pin')) return;
    // Manage users button in settings
    if(e.target.closest('#manageUsersBtn')){ S.modal={type:'manageUsers'}; render(); return; }
    // Delete user
    const delUser = e.target.closest('[data-deluser]');
    if(delUser && canAdmin()){
      const id=delUser.dataset.deluser;
      if(confirm('Slet bruger?')){
        S.users=(S.users||[]).filter(u=>u.id!==id);
        scheduleSave('users'); render();
      }
      return;
    }
    // Edit user - populate form
    const editUser = e.target.closest('[data-edituser]');
    if(editUser && canAdmin()){
      const u=(S.users||[])[parseInt(editUser.dataset.edituser)];
      if(u){
        const n=document.getElementById('uf-name'); if(n) n.value=u.name;
        const p=document.getElementById('uf-pin');  if(p) p.value=u.pin;
        const r=document.getElementById('uf-role'); if(r) r.value=u.role;
        const i=document.getElementById('uf-id');   if(i) i.value=u.id;
        const t=document.getElementById('user-form-title'); if(t) t.textContent='Ret bruger';
      }
      return;
    }
    // Save user
    if(e.target.closest('#uf-save') && canAdmin()){
      const name=document.getElementById('uf-name')?.value?.trim();
      const pin =document.getElementById('uf-pin')?.value?.trim();
      const role=document.getElementById('uf-role')?.value;
      const eid =document.getElementById('uf-id')?.value;
      if(!name){ toast('Navn mangler','err'); return; }
      if(!pin || pin.length < 4){ toast('PIN skal være mindst 4 cifre','err'); return; }
      if(!/^\d+$/.test(pin)){ toast('PIN må kun indeholde tal','err'); return; }
      if(!S.users) S.users=[];
      if(eid){
        const u=S.users.find(u=>u.id===eid);
        if(u){ u.name=name; u.pin=pin; u.role=role; }
      } else {
        S.users.push({id:uid(), name, pin, role});
      }
      scheduleSave('users');
      S.modal={type:'manageUsers'}; render();
      toast('Bruger gemt ✓');
      return;
    }
  });}

        btn.type='button'; btn.id='ex-img-del-dyn'; btn.className='btn btn-danger btn-xs'; btn.textContent='Slet billede';
        btn.onclick = () => { window._exImage = null; if(preview) preview.innerHTML=''; drop.style.display=''; btn.remove(); };
        drop.closest('.form-group')?.querySelector('label')?.appendChild(btn);
      }
    }

    function compressAndApply(file) {
      if (!file || !file.type.startsWith('image/')) { toast('Kun billedfiler', 'err'); return; }
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const MAX = 800;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h*MAX/w); w = MAX; } else { w = Math.round(w*MAX/h); h = MAX; } }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          applyImage(canvas.toDataURL('image/jpeg', 0.75));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    drop.addEventListener('click', () => fileInput?.click());
    fileInput?.addEventListener('change', () => { if(fileInput.files[0]) compressAndApply(fileInput.files[0]); });
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor='var(--accent)'; });
    drop.addEventListener('dragleave', () => { drop.style.borderColor=''; });
    drop.addEventListener('drop', e => { e.preventDefault(); drop.style.borderColor=''; compressAndApply(e.dataTransfer.files[0]); });
    ge('ex-img-del')?.addEventListener('click', () => { window._exImage=null; if(preview) preview.innerHTML=''; drop.style.display=''; });
  }
  setupImageHandlers();

  if (!document._imgPasteBound) { document._imgPasteBound = true;
    document.addEventListener('paste', e => {
      if (!ge('ex-img-drop')) return;
      for (const item of (e.clipboardData?.items||[])) {
        if (item.type.startsWith('image/')) {
          const blob = item.getAsFile();
          if (blob) compressAndApply_global(blob);
          break;
        }
      }
    });
  }
  function compressAndApply_global(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 800; let w = img.width, h = img.height;
        if (w > MAX || h > MAX) { if (w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
        const canvas = document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
        window._exImage = dataUrl;
        const preview = ge('ex-img-preview');
        const drop = ge('ex-img-drop');
        if (preview) preview.innerHTML = '<img src="'+dataUrl+'" style="max-width:100%;max-height:200px;border-radius:6px;display:block;">';
        if (drop) drop.style.display = 'none';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }
  on('[data-savecex]',el=>{
    const si=+el.dataset.savecex;
    const n=document.getElementById('cex-n')?.value?.trim();
    if(!n){toast('Navn mangler','err');return;}
    const addToCat=document.getElementById('cex-addcat')?.checked;
    const ex={exerciseId:null,customName:n,mins:10};
    S.draft.sections[si].exercises.push(ex);
    if(addToCat){
      const d=document.getElementById('cex-d')?.value||'';
      const tags=(document.getElementById('cex-t')?.value||'').split(',').map(x=>x.trim()).filter(Boolean);
      const cat=document.getElementById('cex-cat')?.value||'hal';
      const newEx={id:uid(),name:n,description:d,stars:0,tags,variants:'',link:'',catalog:cat};
      if(cat==='hal')S.halCatalog.push(newEx);else S.fysCatalog.push(newEx);
      ex.exerciseId=newEx.id; ex.customName=undefined;
      scheduleSave(cat);
      toast(`"${n}" tilføjet til katalog`);
    }
    S.modal=null;render();
  });
  ge('cex-addcat')?.addEventListener('change',function(){
    const opts=document.getElementById('cex-cat-opts');
    if(opts) opts.style.display=this.checked?'block':'none';
  });
  bindImport();
  // AI generate button (modal re-renders each time, so bind via document delegation)
  if(!document._aigenBound){document._aigenBound=true;document.addEventListener('click',e=>{
    if(e.target.closest('#ai-gen-btn')){e.stopPropagation();generateAIDescription();}
  });}
  ge('archStar')?.addEventListener('change',function(){S.archFilter.stars=+this.value;render();});
  ge('archLoc')?.addEventListener('change',function(){S.archFilter.loc=this.value;render();});
  ge('archTr')?.addEventListener('change',function(){S.archFilter.trainer=this.value;render();});
  on('[data-clone]',  el=>{const t=S.trainings.find(x=>x.id===el.dataset.clone);if(!t)return;const c=JSON.parse(JSON.stringify(t));c.id=uid();c.archived=false;c.date='';c.stars=0;c.title=(c.title||'Træning')+' (kopi)';S.draft=c;S.tab='traening';render();});
  on('[data-restore]',el=>requireUnlock(()=>{const t=S.trainings.find(x=>x.id===el.dataset.restore);if(t){t.archived=false;scheduleSave('trainings');toast('Genskabt');render();}}));
  on('[data-deltrain]',el=>requireUnlock(()=>{if(confirm('Slet permanent?')){S.trainings=S.trainings.filter(x=>x.id!==el.dataset.deltrain);scheduleSave('trainings');render();}}));
  ge('confirmTmpl')?.addEventListener('click',()=>{const n=v('tmpl-n')?.trim();if(!n){toast('Navn mangler','err');return;}S.templates.push({id:uid(),name:n,sections:JSON.parse(JSON.stringify(S.draft.sections||[]))});scheduleSave('templates');toast(`Skabelon "${n}" gemt`);S.modal=null;render();});
  on('[data-usetmpl]',el=>{const tid=el.dataset.usetmpl;const nt={id:uid(),title:'',date:'',startTime:'',endTime:'',location:'',trainers:[],sections:[],stars:0};if(tid!=='blank'){const tm=S.templates.find(t=>t.id===tid);if(tm)nt.sections=JSON.parse(JSON.stringify(tm.sections||[]));}S.draft=nt;S.modal=null;S.tab='traening';S.draftInfoCollapsed=false;render();});
  on('[data-deltmpl]',el=>{S.templates=S.templates.filter(t=>t.id!==el.dataset.deltmpl);scheduleSave('templates');render();});
  on('[data-deltmplset]',el=>{if(!confirm('Slet skabelon?'))return;S.templates=S.templates.filter(t=>t.id!==el.dataset.deltmplset);scheduleSave('templates');toast('Skabelon slettet');render();});
  on('[data-renametmpl]',el=>{
    const tmpl=S.templates.find(t=>t.id===el.dataset.renametmpl);
    if(!tmpl)return;
    const name=prompt('Nyt navn:',tmpl.name);
    if(!name||!name.trim())return;
    tmpl.name=name.trim();
    scheduleSave('templates');
    toast('Skabelon omdøbt ✓');
    render();
  });
  ge('mclose')?.addEventListener('click',()=>{S.modal=null;render();});
  document.querySelectorAll('.mclose').forEach(el=>el.addEventListener('click',()=>{S.modal=null;render();}));
  ge('moverlay')?.addEventListener('click',e=>{if(e.target.id==='moverlay'){S.modal=null;render();}});
}

function bindImport() {
  const dz=ge('dropZ');
  if(dz){
    dz.addEventListener('click',()=>ge('impFile')?.click());
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});

function handleImport(file) {
  if(!file)return;
  const ct=v('imp-cat')||'hal', st=ge('impStatus');
  if(st)st.innerHTML='<span style="color:var(--yellow);">Indlæser…</span>';
  if(file.name.endsWith('.csv')){
    const r=new FileReader();r.onload=e=>applyImport(parseCSV(e.target.result,ct),ct,st);r.readAsText(file,'UTF-8');
  } else {
    const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];applyImport(parseRows(XLSX.utils.sheet_to_json(ws,{header:1,defval:''}),ct),ct,st);}catch(err){if(st)st.innerHTML=`<span style="color:var(--red);">Fejl: ${err.message}</span>`;}};r.readAsArrayBuffer(file);
  }
}
function parseCSV(text,cat){
  const lines=text.split('\n').filter(l=>l.trim());
  if(!lines.length)return[];
  const header=lines[0].split(',').map(x=>x.trim().replace(/^"|"$/g,'').toLowerCase());
  const idx=k=>header.indexOf(k);
  return lines.slice(1).map(line=>{
    const c=line.split(',').map(x=>x.trim().replace(/^"|"$/g,''));
    const name=idx('navn')>=0?c[idx('navn')]:c[0]||'';
    if(!name)return null;
    return{
      id: idx('id')>=0&&c[idx('id')]?c[idx('id')]:uid(),
      catalog: idx('katalog')>=0&&c[idx('katalog')]?c[idx('katalog')]:cat,
      name,
      description: idx('beskrivelse')>=0?c[idx('beskrivelse')]||'':c[1]||'',
      stars: Math.min(5,Math.max(0,parseInt(idx('stjærner')>=0?c[idx('stjærner')]:(idx('stjerner')>=0?c[idx('stjerner')]:c[2]))||0)),
      tags: (idx('tags')>=0?c[idx('tags')]:c[3]||'').split(';').map(x=>x.trim()).filter(Boolean),
      variants: idx('varianter')>=0?c[idx('varianter')]||'':c[4]||'',
      link: idx('link')>=0?c[idx('link')]||'':c[5]||'',
      aldersgrupper: (idx('aldersgruppe')>=0?c[idx('aldersgruppe')]||'':'').split(';').map(x=>x.trim()).filter(Boolean),
      defaultMins: parseInt(idx('vejledende minutter')>=0?c[idx('vejledende minutter')]||'':'') ||null,
    };
  }).filter(Boolean);
}
function parseRows(rows,cat){
  if(!rows||!rows.length)return[];
  const hasHeader=isNaN(rows[0]?.[2]);
  const header=hasHeader?rows[0].map(h=>String(h||'').toLowerCase().trim()):null;
  const idx=k=>header?header.indexOf(k):-1;
  return rows.slice(hasHeader?1:0).map(c=>{
    const name=idx('navn')>=0?String(c[idx('navn')]||'').trim():String(c[0]||'').trim();
    if(!name)return null;
    return{
      id: idx('id')>=0&&c[idx('id')]?String(c[idx('id')]).trim():uid(),
      catalog: idx('katalog')>=0&&c[idx('katalog')]?String(c[idx('katalog')]).trim():cat,
      name,
      description: String(idx('beskrivelse')>=0?c[idx('beskrivelse')]||'':c[1]||'').trim(),
      stars: Math.min(5,Math.max(0,parseInt(String(idx('stjærner')>=0?c[idx('stjærner')]:(idx('stjerner')>=0?c[idx('stjerner')]:c[2])))||0)),
      tags: String(idx('tags')>=0?c[idx('tags')]:c[3]||'').split(';').map(x=>x.trim()).filter(Boolean),
      variants: String(idx('varianter')>=0?c[idx('varianter')]||'':c[4]||'').trim(),
      link: String(idx('link')>=0?c[idx('link')]||'':c[5]||'').trim(),
      aldersgrupper: String(idx('aldersgruppe')>=0?c[idx('aldersgruppe')]||'':'').split(';').map(x=>x.trim()).filter(Boolean),
      defaultMins: (()=>{const i=idx('vejledende minutter');const v=i>=0?c[i]:undefined;const result=v!==undefined&&v!==''?parseInt(String(v))||null:null;return result;})(),
    };
  }).filter(Boolean);
}
function applyImport(exs,ct,st){
  if(!exs.length){if(st)st.innerHTML='<span style="color:var(--red);">Ingen øvelser fundet</span>';return;}
  const arr=ct==='hal'?S.halCatalog:S.fysCatalog;
  let add=0,upd=0;
  exs.forEach(ex=>{let i=ex.id?arr.findIndex(e=>e.id===ex.id):-1;if(i<0)i=arr.findIndex(e=>e.name.toLowerCase()===ex.name.toLowerCase());if(i>=0){arr[i]={...arr[i],...ex,id:arr[i].id};upd++;}else{arr.push(ex);add++;}});
  scheduleSave(ct);
  if(st)st.innerHTML=`<span style="color:var(--green);">✓ ${add} nye, ${upd} opdateret</span>`;
  toast(`${add} øvelser importeret`);
  setTimeout(()=>{S.modal=null;render();},1400);
}

function toggleTrDropdown(){const d=ge('tr-dropdown');if(d)d.style.display=d.style.display==='none'?'block':'none';}
document.addEventListener('click',e=>{if(!e.target.closest('#tr-display')&&!e.target.closest('#tr-dropdown')){const d=ge('tr-dropdown');if(d)d.style.display='none';}});
function on(sel,fn){document.querySelectorAll(sel).forEach(el=>el.addEventListener('click',e=>fn(el,e)));}
function live(sel,fn){document.querySelectorAll(sel).forEach(el=>el.addEventListener('input',e=>fn(el,e)));}
function ge(id){return document.getElementById(id);}
function v(id){return ge(id)?.value;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function durMin(s,e){if(!s||!e)return 0;const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);return Math.max(0,(eh*60+em)-(sh*60+sm));}
function exportCatalog(fmt){
  const cat=S.catTab==='hal'?S.halCatalog:S.fysCatalog;
  const name=S.catTab==='hal'?'Haltræning':'Fysisk_træning';
  const cols=['Navn','Beskrivelse','Stjerner','Tags','Varianter','Link','Katalog','Kategori','ID','Aldersgruppe','Vejledende minutter'];
  const rows=cat.map(e=>[
    e.name||'',
    e.description||'',
    e.stars||0,
    (e.tags||[]).join(';'),
    (Array.isArray(e.variants)?e.variants.join('; '):(e.variants||'')),
    e.link||'',
    e.catalog||'',
    e.category||'',
    e.id||'',
    (Array.isArray(e.aldersgrupper)?e.aldersgrupper.join(';'):(e.aldersgrupper||'')),
    e.defaultMins||''
  ]);
  if(fmt==='csv'){
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    const csv=[cols,...rows].map(r=>r.map(esc).join(',')).join('\r\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    dlBlob(blob,`Ajax_${name}.csv`);
  } else {
    // Simple XLSX via HTML table trick — opens correctly in Excel
    const esc=v=>String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const tr=cells=>'<tr>'+cells.map(c=>'<td>'+esc(c)+'</td>').join('')+'</tr>';
    const xml=`<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="${name}"><Table>`
      +'<Row>'+cols.map(c=>`<Cell><Data ss:Type="String">${esc(c)}</Data></Cell>`).join('')+'</Row>'
      +rows.map(r=>'<Row>'+r.map(v=>`<Cell><Data ss:Type="String">${esc(v)}</Data></Cell>`).join('')+'</Row>').join('')
      +'</Table></Worksheet></Workbook>';
    const blob=new Blob([xml],{type:'application/vnd.ms-excel;charset=utf-8'});
    dlBlob(blob,`Ajax_${name}.xls`);
  }
  toast(`Eksporterer ${cat.length} øvelser…`);
}
function dlBlob(blob,filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function totalMins(t){
  const secs=t.sections||[];
  // For grouped sections: only count the max mins within each group (they run in parallel)
  const groups={};
  let total=0;
  secs.forEach(sec=>{
    const m=parseInt(sec.mins)||0;
    if(sec.group){
      groups[sec.group]=Math.max(groups[sec.group]||0,m);
    } else {
      total+=m;
    }
  });
  Object.values(groups).forEach(m=>total+=m);
  return total;
}
function trainingLabel(t){
  const wday=fmtWday(t.date);
  const loc=t.location||'';
  const parts=[wday,loc].filter(Boolean);
  return parts.length?parts.map(s=>s.charAt(0).toUpperCase()+s.slice(1)).join(' · '):'Træning';
}
const GRP_CLR={A:['#f59e0b','#78350f'],B:['#8b5cf6','#2e1065'],C:['#06b6d4','#164e63'],D:['#ec4899','#500724'],E:['#22c55e','#14532d'],F:['#f97316','#431407']};
const GROUPS=['A','B','C','D','E','F'];
function grpBadge(g){if(!g)return'';const[bg,fg]=GRP_CLR[g]||['#888','#000'];return`<span class="grp-badge" style="background:${bg};color:${fg};">${g}</span>`;}
function fmtDay(d){return d?+d.split('-')[2]:'?';}
function fmtWday(d){if(!d)return'';const days=['søn','man','tir','ons','tor','fre','lør'];return days[new Date(d).getDay()]||'';}
function fmtMon(d){if(!d)return'';return['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'][+d.split('-')[1]-1]||'';}
function updateTotalMins(){
  const t=S.draft; if(!t) return;
  // Read current values from inputs
  document.querySelectorAll('[data-secmins]').forEach(inp=>{
    const si=+inp.dataset.secmins;
    if(t.sections[si]) t.sections[si].mins=parseInt(inp.value)||0;
  });
  const dur=durMin(t.startTime,t.endTime);
  const tot=totalMins(t);
  const el=document.getElementById('total-mins-display');
  if(el){
    const mc=tot>dur?'mins-over':tot>dur*.9?'mins-warn':'mins-ok';
    el.innerHTML=`Varighed: <strong>${dur>0?dur+' min':'–'}</strong> · Total planlagt: <strong class="${mc}" style="font-size:14px;">${tot} min</strong>${tot>dur&&dur>0?'<span style="color:var(--red);font-weight:600;"> ⚠ '+(tot-dur)+' min over!</span>':''}`;
  }
}
function toast(msg,type='ok'){const c=ge('toastWrap');const d=document.createElement('div');d.className=`toast toast-${type}`;d.textContent=msg;c.appendChild(d);setTimeout(()=>d.remove(),2800);}
