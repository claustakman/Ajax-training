<style>
  :root {
    --bg:#111318; --bg2:#181c24; --bg3:#1e2330; --bg4:#252d3e;
    --border:#2a3248; --border2:#38435e;
    --accent:#C8102E; --accent2:#e02040; --accent-light:rgba(200,16,46,0.12);
    --green:#22c55e; --yellow:#f59e0b; --blue:#3b82f6; --purple:#8b5cf6;
    --text:#eef0f5; --text2:#8d97b0; --text3:#4d5878; --red:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
  #app{display:flex;flex-direction:column;height:100vh}

  .topbar{background:var(--bg2);border-bottom:3px solid var(--accent);display:flex;align-items:center;padding:0 20px;height:54px;gap:0;flex-shrink:0}
  .topbar-logo{display:flex;align-items:center;gap:10px;margin-right:28px}
  .logo-text .club{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--accent);letter-spacing:.05em;text-transform:uppercase}
  .logo-text .team{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.12em;text-transform:uppercase}
  .nav-tabs{display:flex;height:100%}
  .nav-tab{background:none;border:none;color:var(--text3);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:0 16px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;margin-bottom:-3px;white-space:nowrap}
  .nav-tab:hover{color:var(--text2)}
  .nav-tab.active{color:#fff;border-bottom-color:var(--accent)}
  .sync-indicator{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
  .sync-dot.ok{background:var(--green)}
  .sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
  .sync-dot.err{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .content{flex:1;overflow-y:auto;padding:24px}

  .card{background:var(--bg2);border:1px solid var(--border);border-radius:8px}
  .card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .card-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text2)}
  .card-body{padding:16px}

  .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:5px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
  .btn-secondary{background:var(--bg3);border:1px solid var(--border2);color:var(--text)}.btn-secondary:hover{background:var(--bg4)}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
  .btn-danger{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}.btn-danger:hover{background:rgba(239,68,68,.22)}
  .btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:2px 7px;font-size:11px}.btn-icon{padding:5px 7px}

  input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:8px 11px;font-family:'DM Sans',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  select option{background:var(--bg3)}
  label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase}
  .form-group{margin-bottom:13px}
  .form-row{display:grid;gap:10px}

  .stars{display:inline-flex;gap:3px}
  .star{cursor:pointer;font-size:18px;color:var(--text3);transition:color .1s;line-height:1}
  .star.filled{color:var(--yellow)}
  .tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:500;background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
  .tags-wrap{display:flex;flex-wrap:wrap;gap:4px}

  .sc-fysisk{--sc:#f59e0b}.sc-opvarmning{--sc:#22c55e}.sc-afleveringer{--sc:#3b82f6}
  .sc-kontra{--sc:#C8102E}.sc-teknik{--sc:#8b5cf6}.sc-spil{--sc:#06b6d4}
  .sc-keeper{--sc:#ec4899}.sc-forsvar{--sc:#f97316}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(0,0,0,.7)}
  .modal-lg{max-width:900px}.modal-sm{max-width:440px}
  .modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.04em}
  .modal-body{padding:20px}
  .modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .flex-row{display:flex;align-items:center;gap:8px}
  .flex-between{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .pill-group{display:flex;flex-wrap:wrap;gap:6px}
  .pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s}
  .pill:hover{border-color:var(--accent);color:var(--text)}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
  .divider{border:none;border-top:1px solid var(--border);margin:14px 0}
  ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  .empty{text-align:center;padding:40px 20px;color:var(--text3)}
  .empty-icon{font-size:36px;margin-bottom:10px}
  .list-item{border:1px solid var(--border);border-radius:6px;background:var(--bg3);padding:12px 14px;margin-bottom:8px;transition:border-color .15s;cursor:pointer}
  .list-item:hover{border-color:var(--border2)}
  .list-title{font-weight:600;font-size:14px;margin-bottom:3px}
  .list-meta{color:var(--text2);font-size:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .prog-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
  .prog-fill{height:100%;border-radius:2px;transition:width .3s}
  .mins-ok{color:var(--green)}.mins-warn{color:var(--yellow)}.mins-over{color:var(--red)}
  .sec-block{border:1px solid var(--border);border-left:3px solid var(--sc,var(--accent));border-radius:6px;margin-bottom:10px;overflow:hidden}
  .sec-block-head{padding:9px 13px;background:var(--bg3);display:flex;align-items:center;gap:8px}
  .sec-block-body{padding:12px;background:var(--bg2)}
  .sec-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--sc,var(--text))}
  .sec-mins{font-size:12px;color:var(--text2);margin-left:auto}
  .ex-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;margin-bottom:5px}
  .ex-row-name{flex:1;font-size:13px}
  .mins-inp{width:60px;flex-shrink:0;padding:5px 8px}
  .parallel-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--purple);font-weight:600;text-transform:uppercase;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);padding:2px 6px;border-radius:3px}
  .q-card{border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .q-head{padding:12px 16px;display:flex;align-items:center;gap:12px}
  .q-num{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;line-height:1}
  .q-body{padding:14px;background:var(--bg2)}
  .theme-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;margin-bottom:5px}
  .theme-inp{flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
  .theme-inp::placeholder{color:var(--text3)}
  .loc-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
  .loc-valby{border-color:rgba(200,16,46,.4);color:#ff8096;background:rgba(200,16,46,.08)}
  .loc-bavnehoj{border-color:rgba(59,130,246,.4);color:#93c5fd;background:rgba(59,130,246,.08)}
  .loc-dybboel{border-color:rgba(34,197,94,.4);color:#86efac;background:rgba(34,197,94,.08)}
  .toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:6px}
  .toast{padding:10px 16px;border-radius:5px;font-size:13px;font-weight:500;animation:toastIn .2s ease;border-left:3px solid;min-width:220px}
  .toast-ok{background:#052e16;border-color:var(--green);color:#86efac}
  .toast-err{background:#450a0a;border-color:var(--red);color:#fca5a5}
  .toast-info{background:#1e3a5f;border-color:var(--blue);color:#93c5fd}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .search-wrap{position:relative}.search-wrap input{padding-left:32px}
  .search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:14px}
  .subtabs{display:flex;margin-bottom:18px;border-bottom:1px solid var(--border)}
  .subtab{background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
  .subtab:hover{color:var(--text)}.subtab.active{color:var(--text);border-bottom-color:var(--accent)}
  .cat-row{display:grid;grid-template-columns:200px 1fr 100px 120px 50px 36px;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px}
  .cat-row:hover{background:var(--bg3);cursor:pointer}
  .cat-hdr{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;background:var(--bg3);cursor:default!important}
  .cat-hdr:hover{background:var(--bg3)}
  .arch-tbl{width:100%;border-collapse:collapse}
  .arch-tbl th{text-align:left;padding:9px 11px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
  .arch-tbl td{padding:11px 11px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
  .arch-tbl tr:hover td{background:var(--bg3)}
  .stars-sm{color:var(--yellow);font-size:12px;letter-spacing:1px}
  .drop-zone{border:2px dashed var(--border2);border-radius:8px;padding:36px;text-align:center;cursor:pointer;transition:all .2s}
  .drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:var(--accent-light)}
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text2)}
  .spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ex-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;font-size:12px;}
  .ex-check.checked{background:var(--green);border-color:var(--green);color:#fff;}
  .ex-row.done .ex-row-name>div{text-decoration:line-through;opacity:.45;}
  .sec-done-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--green);}
  .grp-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}
  .grp-border-A{border-left-color:#f59e0b!important}
  .grp-border-B{border-left-color:#8b5cf6!important}
  .grp-border-C{border-left-color:#06b6d4!important}
  .grp-border-D{border-left-color:#ec4899!important}
  .grp-border-E{border-left-color:#22c55e!important}
  .grp-border-F{border-left-color:#f97316!important}

  /* ── RESPONSIVE ─────────────────────────────────────────── */
  @media (max-width: 640px) {
    body{font-size:15px}
    .content{padding:12px}

    /* Topbar: taller for easier tapping */
    .topbar{padding:0 8px;height:52px}
    .topbar-logo .logo-text{display:none}
    .topbar-logo{margin-right:6px}

    /* Nav tabs: bigger touch targets */
    .nav-tab{padding:0 11px;font-size:13px;height:52px;min-width:44px}
    .sync-indicator span{display:none}

    /* Editor: stack cards vertically */
    .editor-grid{grid-template-columns:1fr !important}
    .info-grid{grid-template-columns:1fr !important}

    /* Årshjul: single column */
    .aarshjul-grid{grid-template-columns:1fr !important}

    /* Theme text truncation fix */
    .theme-inp{font-size:14px}
    .q-num{font-size:24px}

    /* Section header: wrap on small screens, bigger tap targets */
    .sec-block-head{flex-wrap:wrap;gap:6px;padding:10px 10px}
    .sec-label{font-size:13px}

    /* Buttons: minimum 44px touch target height */
    .btn{min-height:38px;font-size:14px}
    .btn-sm{min-height:34px;font-size:13px;padding:5px 11px}
    .btn-xs{min-height:28px;font-size:12px;padding:3px 8px}

    /* Inputs larger on mobile */
    input,select,textarea{font-size:16px;padding:10px 12px} /* 16px prevents iOS zoom */
    label{font-size:12px}

    /* Catalog table: hide description and stars cols on mobile */
    .cat-row{grid-template-columns:1fr 80px 40px 32px !important}
    .cat-col-desc,.cat-col-stars{display:none}

    /* Archive table: simplify */
    .arch-tbl .hide-mobile{display:none}

    /* Modal: full-width, easier to read */
    .modal-overlay{padding:10px 6px}
    .modal-body{padding:14px}
    .modal-title{font-size:15px}

    /* Training card buttons stack */
    .tcard-actions{flex-direction:column;align-items:stretch}
    .tcard-actions .btn{justify-content:center}

    /* Pills: bigger */
    .pill{padding:7px 13px;font-size:13px}
  }

  @media (max-width: 480px) {
    .nav-tab{padding:0 8px;font-size:12px}
  }
</style>
</head>

// ─── GOOGLE SHEETS JWT AUTH ────────────────────────────────────────────────────
// Minimal JWT/OAuth2 implementation for Sheets API using Web Crypto
async function getAccessToken() {
  const cfg = GSHEETS_CONFIG;
  if (!cfg.clientEmail || cfg.clientEmail.startsWith('__')) return null;

  const now = Math.floor(Date.now() / 1000);
  const header = { alg: 'RS256', typ: 'JWT' };
  const claim  = {
    iss: cfg.clientEmail,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud: 'https://oauth2.googleapis.com/token',
    exp: now + 3600,
    iat: now,
  };

  const b64u = s => btoa(unescape(encodeURIComponent(JSON.stringify(s)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const unsigned = `${b64u(header)}.${b64u(claim)}`;

  // Import private key
  const pem = cfg.privateKey.replace(/-----BEGIN RSA PRIVATE KEY-----|-----END RSA PRIVATE KEY-----|-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n|\r/g,'');
  const derBuf = Uint8Array.from(atob(pem), c => c.charCodeAt(0));
  const cryptoKey = await crypto.subtle.importKey(
    'pkcs8', derBuf.buffer,
    { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
    false, ['sign']
  );

  const sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', cryptoKey, new TextEncoder().encode(unsigned));
  const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const jwt = `${unsigned}.${sigB64}`;

  const resp = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
  });
  const data = await resp.json();
  return data.access_token || null;
}

// ─── SHEETS API ───────────────────────────────────────────────────────────────
const SHEET_ID  = GSHEETS_CONFIG.spreadsheetId;
const SHEETS    = { trainings:'Træninger', quarters:'Årshjul', hal:'Haltræning', fys:'FysiskTræning' };
let _token = null;
let _tokenExp = 0;

async function token() {
  if (_token && Date.now() < _tokenExp) return _token;
  _token = await getAccessToken();
  _tokenExp = Date.now() + 3500000;
  return _token;
}

async function sheetsGet(range) {
  const t = await token(); if (!t) return null;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`;
  const r = await fetch(url, { headers: { Authorization: `Bearer ${t}` } });
  if (!r.ok) return null;
  const d = await r.json();
  return d.values || [];
}

async function sheetsUpdate(range, values) {
  const t = await token(); if (!t) return false;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`;
  const r = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${t}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ range, majorDimension: 'ROWS', values })
  });
  return r.ok;
}

async function sheetsClear(range) {
  const t = await token(); if (!t) return false;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:clear`;
  const r = await fetch(url, { method: 'POST', headers: { Authorization: `Bearer ${t}` } });
  return r.ok;
}

// Ensure all required sheets exist
async function ensureSheets() {
  const t = await token(); if (!t) return;
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`, {
    headers: { Authorization: `Bearer ${t}` }
  });
  if (!r.ok) return;
  const meta = await r.json();
  const existing = (meta.sheets || []).map(s => s.properties.title);
  const needed = Object.values(SHEETS).filter(s => !existing.includes(s));
  if (!needed.length) return;
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${t}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ requests: needed.map(title => ({ addSheet: { properties: { title } } })) })
  });
}

// ─── DATA SERIALIZATION ───────────────────────────────────────────────────────
// Trainings: each row = JSON string of one training object
async function loadTrainings() {
  const rows = await sheetsGet(`${SHEETS.trainings}!A:A`);
  if (!rows) return null;
  return rows.map(r => { try { return JSON.parse(r[0]); } catch { return null; } }).filter(Boolean);
}
async function saveTrainings(trainings) {
  await sheetsClear(`${SHEETS.trainings}!A:A`);
  if (!trainings.length) return true;
  return sheetsUpdate(`${SHEETS.trainings}!A1`, trainings.map(t => [JSON.stringify(t)]));
}

// Quarters: each row = JSON string of one quarter
async function loadQuarters() {
  const rows = await sheetsGet(`${SHEETS.quarters}!A:A`);
  if (!rows || !rows.length) return null;
  return rows.map(r => { try { return JSON.parse(r[0]); } catch { return null; } }).filter(Boolean);
}
async function saveQuarters(quarters) {
  await sheetsClear(`${SHEETS.quarters}!A:A`);
  return sheetsUpdate(`${SHEETS.quarters}!A1`, quarters.map(q => [JSON.stringify(q)]));
}

// Catalogs: rows = name, description, stars, tags(;), variants, link, catalog, category
function catalogToRows(exercises) {
  return [
    ['navn','beskrivelse','stjerner','tags','varianter','link','katalog','kategori','id'],
    ...exercises.map(e => [
      e.name||'', e.description||'', e.stars||'',
      (e.tags||[]).join(';'), e.variants||'', e.link||'',
      e.catalog||'hal', e.category||'', e.id||uid()
    ])
  ];
}
function rowsToCatalog(rows, catalog) {
  if (!rows || rows.length < 2) return null;
  return rows.slice(1).map(r => ({
    id: r[8] || uid(), name: r[0]||'', description: r[1]||'',
    stars: parseInt(r[2])||0, tags: r[3]?(r[3].split(';').map(x=>x.trim()).filter(Boolean)):[],
    variants: r[4]||'', link: r[5]||'', catalog: r[6]||catalog, category: r[7]||'',
  })).filter(e => e.name);
}
async function loadCatalog(sheet) {
  const rows = await sheetsGet(`${sheet}!A:I`);
  return rowsToCatalog(rows, sheet === SHEETS.hal ? 'hal' : 'fys');
}
async function saveCatalog(sheet, exercises) {
  await sheetsClear(`${sheet}!A:I`);
  const rows = catalogToRows(exercises);
  return sheetsUpdate(`${sheet}!A1`, rows);
}

// ─── SYNC ─────────────────────────────────────────────────────────────────────
let saveTimer = null;
function scheduleSave(type) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => pushToSheets(type), 1500);
}

async function pushToSheets(type) {
  S.syncStatus = 'syncing'; updateSyncUI();
  try {
    if (type === 'trainings' || type === 'all') await saveTrainings(S.trainings);
    if (type === 'quarters'  || type === 'all') await saveQuarters(S.quarters);
    if (type === 'hal'       || type === 'all') await saveCatalog(SHEETS.hal, S.halCatalog);
    if (type === 'fys'       || type === 'all') await saveCatalog(SHEETS.fys, S.fysCatalog);
    S.syncStatus = 'ok'; updateSyncUI();
  } catch(e) {
    S.syncStatus = 'err'; updateSyncUI();
    toast('Synkronisering fejlede', 'err');
  }
}

async function loadFromSheets() {
  S.syncStatus = 'loading'; render();
  try {
    await ensureSheets();
    const [trainings, quarters, hal, fys] = await Promise.all([
      loadTrainings(), loadQuarters(),
      loadCatalog(SHEETS.hal), loadCatalog(SHEETS.fys)
    ]);
    if (trainings !== null) S.trainings  = trainings;
    if (quarters  !== null) S.quarters   = quarters;
    // If catalog was empty in Sheets, write the hardcoded data up
    if (hal !== null) {
      S.halCatalog = hal;
    } else {
      await saveCatalog(SHEETS.hal, S.halCatalog);
      toast('Haltræningskatalog gemt i regneark', 'info');
    }
    if (fys !== null) {
      S.fysCatalog = fys;
    } else {
      await saveCatalog(SHEETS.fys, S.fysCatalog);
      toast('Fysisk træningskatalog gemt i regneark', 'info');
    }
    S.syncStatus = 'ok';
  } catch(e) {
    S.syncStatus = 'err';
    toast('Kunne ikke forbinde til Google Sheets', 'err');
  }
  render();
}

function updateSyncUI() {
  const dot  = document.getElementById('syncDot');
  const lbl  = document.getElementById('syncLbl');
  if (!dot || !lbl) return;
  const map = { ok:['ok','Synkroniseret'], syncing:['syncing','Gemmer…'], err:['err','Fejl'], loading:['syncing','Indlæser…'] };
  const [cls, txt] = map[S.syncStatus] || ['',''];
  dot.className = `sync-dot ${cls}`;
  lbl.textContent = txt;
}

    <div class="card" style="margin-bottom:14px;">
      <div class="card-header" id="info-toggle" style="cursor:pointer;user-select:none;" onclick="S.draftInfoCollapsed=!S.draftInfoCollapsed;lsSave('infoCollapsed',S.draftInfoCollapsed);document.getElementById('info-body').style.display=S.draftInfoCollapsed?'none':'block';this.querySelector('.info-chevron').style.transform=S.draftInfoCollapsed?'rotate(-90deg)':'rotate(0deg)';document.getElementById('info-summary').style.display=S.draftInfoCollapsed?'flex':'none';">
        <span class="card-title">Oplysninger & trænere</span>
        <div id="info-summary" style="display:none;align-items:center;gap:8px;font-size:12px;color:var(--text2);">
          <span>${t.date?fmtWday(t.date)+' '+fmtDay(t.date)+' '+fmtMon(t.date):'–'}</span>
          ${t.location?`<span class="loc-chip ${LOC_CLS[t.location]||''}">${t.location}</span>`:''}
          <span>${t.startTime||''}${t.startTime&&t.endTime?' – ':''}${t.endTime||''}</span>
          ${(t.trainers||[]).length?`<span style="color:var(--text3);">· ${(t.trainers||[]).join(', ')}</span>`:''}
        </div>
        <span class="info-chevron" style="color:var(--text3);font-size:13px;transition:transform .2s;flex-shrink:0;">▾</span>
      </div>
      <div id="info-body" class="card-body">
        <div class="info-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;">

          <!-- Kolonne 1: Tid, Sted, Trænere -->
          <div>
            <div class="form-row" style="grid-template-columns:1fr 1fr;">
              <div class="form-group"><label>Dato</label><input type="date" id="e-date" value="${t.date||''}"></div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <div class="form-group"><label>Start</label><input type="time" id="e-start" value="${t.startTime||''}"></div>
                <div class="form-group"><label>Slut</label><input type="time" id="e-end" value="${t.endTime||''}"></div>
              </div>
            </div>
            <div id="total-mins-display" style="font-size:14px;color:var(--text2);margin-bottom:12px;padding:8px 10px;background:var(--bg3);border-radius:6px;border:1px solid var(--border);">Varighed: <strong style="font-size:16px;">${dur>0?dur+' min':'–'}</strong> &nbsp;·&nbsp; Planlagt: <strong class="${mc}" style="font-size:16px;">${tot} min</strong>${tot>dur&&dur>0?`<span style="color:var(--red);font-weight:600;"> ⚠ ${tot-dur} over</span>`:''}</div>
            <div class="form-group"><label>Sted</label><div class="pill-group" style="margin-top:4px;">${LOCATIONS.map(l=>`<button class="pill${t.location===l?' active':''}" data-loc="${l}">${l}</button>`).join('')}</div></div>
            <div class="form-group">
              <label>Ansvarlig træner</label>
              <select id="e-lead" style="margin-bottom:10px;">
                <option value="">– Vælg –</option>
                ${TRAINERS.map(tr=>`<option value="${tr}" ${t.leadTrainer===tr?'selected':''}>${tr}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label>Trænere til stede</label>
              <div style="position:relative;">
                <div id="tr-display" style="background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:8px 32px 8px 11px;cursor:pointer;min-height:38px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;" onclick="toggleTrDropdown()">
                  ${(t.trainers||[]).length===0?`<span style="color:var(--text3);font-size:13px;">Vælg trænere…</span>`:(t.trainers||[]).map(tr=>`<span style="background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35);color:#93c5fd;padding:2px 8px;border-radius:3px;font-size:12px;font-weight:500;">${tr}</span>`).join('')}
                  <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;">▾</span>
                </div>
                <div id="tr-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;box-shadow:0 8px 24px rgba(0,0,0,.5);margin-top:3px;overflow:hidden;">
                  ${TRAINERS.map(tr=>`<div style="padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s;" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''" data-tr-opt="${tr}">
                    <span style="width:16px;height:16px;border-radius:3px;border:1px solid ${(t.trainers||[]).includes(tr)?'var(--accent)':'var(--border2)'};background:${(t.trainers||[]).includes(tr)?'var(--accent)':'transparent'};display:inline-flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;">${(t.trainers||[]).includes(tr)?'✓':''}</span>
                    <span style="font-size:13px;">${tr}</span>
                  </div>`).join('')}
                </div>
              </div>
            </div>
          </div>

          <!-- Kolonne 2: Fokus & Temaer -->
          <div>
            <div class="form-group"><label>Fokuspunkter</label><input id="e-focus" value="${esc(t.focusPoints||'')}" placeholder="Dagens fokus"></div>
            <div class="form-group"><label>Temaer</label>${(()=>{const ut=[...new Set(themes)];return ut.length?`<div class="pill-group" style="margin-top:4px;">${ut.map(th=>`<button class="pill btn-sm${(t.themes||[]).includes(th)?' active':''}" data-etheme="${esc(th)}">${esc(th)}</button>`).join('')}</div><p style="font-size:11px;color:var(--text3);margin-top:5px;">${(t.themes||[]).join(' · ')||'Ingen valgt'}</p>`:'<p style="font-size:12px;color:var(--text3);margin-top:4px;">Ingen temaer – gå til Årshjul</p>'})()}</div>
          </div>

          <!-- Kolonne 3: Noter & Vurdering -->
          <div>
            <div class="form-group"><label>Interne noter</label><textarea id="e-notes" style="min-height:90px;max-height:260px;resize:vertical;overflow-y:auto;">${esc(t.notes||'')}</textarea></div>
            <div class="form-group"><label>Vurdering</label><div class="stars" id="e-stars">${[1,2,3,4,5].map(n=>`<span class="star${(t.stars||0)>=n?' filled':''}" data-estr="${n}">★</span>`).join('')}</div></div>
          </div>

        </div>
      </div>
    </div>
    <div class="card"><div class="card-header"><span class="card-title">Sektioner & øvelser</span><button class="btn btn-secondary btn-sm" id="addSecBtn">+ Tilføj sektion</button></div>
      <div class="card-body" id="secs-wrap">
        ${(t.sections||[]).map((s,si)=>html_sec(s,si)).join('')}
        ${!(t.sections||[]).length?`<div class="empty" style="padding:28px;"><p>Ingen sektioner – klik "+ Tilføj sektion"</p></div>`:''}
      </div>
    </div>
  </div>`;
}

function renderSecs() {
  const wrap = document.getElementById('secs-wrap');
  if (!wrap || !S.draft) return;
  const secs = S.draft.sections || [];
  wrap.innerHTML = secs.map((s,si) => html_sec(s,si)).join('')
    + (!secs.length ? '<div class="empty" style="padding:28px;"><p>Ingen sektioner – klik &quot;+ Tilføj sektion&quot;</p></div>' : '');
}

function html_sec(sec,si) {
  const def=SECTIONS.find(s=>s.id===sec.type)||SECTIONS[0];
  const collapsed=sec.collapsed||false;
  const exCount=(sec.exercises||[]).length;
  return `<div class="sec-block ${def.cls}${sec.group?` grp-border-${sec.group}`:''}" data-si="${si}">
    <div class="sec-block-head" style="cursor:pointer;" data-collapse="${si}">
      <div style="display:flex;flex-direction:column;gap:1px;flex-shrink:0;">
        <button class="btn btn-ghost btn-xs" style="padding:1px 4px;font-size:10px;line-height:1;${si===0?'opacity:.25;cursor:default;':''}" data-movesec="${si}-up" ${si===0?'disabled':''}>▲</button>
        <button class="btn btn-ghost btn-xs" style="padding:1px 4px;font-size:10px;line-height:1;${si===(S.draft?.sections||[]).length-1?'opacity:.25;cursor:default;':''}" data-movesec="${si}-down" ${si===(S.draft?.sections||[]).length-1?'disabled':''}>▼</button>
      </div>
      <span style="color:var(--text3);font-size:11px;transition:transform .2s;display:inline-block;transform:${collapsed?'rotate(-90deg)':'rotate(0deg)'};">▾</span>
      <span class="sec-label" style="color:${def.color};">${def.label}</span>
      ${(()=>{const exs=sec.exercises||[];const done=exs.filter(e=>e.done).length;if(!exs.length)return '';if(done===exs.length)return '<span class="sec-done-badge">✓ Færdig</span>';return `<span style="font-size:11px;color:var(--text3);">${done}/${exs.length}</span>`;})()}
      ${sec.group?grpBadge(sec.group):''}
      ${collapsed?`<span style="font-size:13px;color:var(--text2);">${exCount} øvelse${exCount!==1?'r':''}</span><span style="font-size:15px;font-weight:700;color:var(--text);margin-left:6px;">${sec.mins||'–'} <span style="font-size:12px;font-weight:500;color:var(--text2);">min</span></span>`:''}
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;${collapsed?'display:none;':''}" onclick="event.stopPropagation()">
        <input type="number" class="mins-inp" min="1" max="240" value="${sec.mins||''}" placeholder="–" data-secmins="${si}" style="width:52px;font-size:15px;font-weight:700;text-align:center;padding:4px 6px;" title="Minutter til denne sektion">
        <span style="font-size:13px;font-weight:600;color:var(--text2);">min</span>
      </div>
      <select class="btn btn-ghost btn-xs" data-grpsel="${si}" style="padding:3px 4px;font-size:11px;${collapsed?'display:none;':''}" onclick="event.stopPropagation()" title="Parallel gruppe">
        <option value="">Gruppe –</option>
        ${GROUPS.map(g=>`<option value="${g}" ${sec.group===g?'selected':''}>${g}</option>`).join('')}
      </select>
      <button class="btn btn-secondary btn-xs" data-addex="${si}" style="${collapsed?'display:none;':''}">+ Øvelse</button>
      <button class="btn btn-danger btn-xs" data-delsec="${si}" onclick="event.stopPropagation()">✕</button>
    </div>
    ${collapsed?'':`<div class="sec-block-body" id="sbd-${si}">
      ${(sec.exercises||[]).map((ex,ei)=>html_exrow(ex,si,ei)).join('')}
      ${!exCount?`<p style="color:var(--text3);font-size:12px;">Ingen øvelser</p>`:''}
    </div>`}
  </div>`;
}

function html_exrow(ex,si,ei) {
  const all=S.halCatalog.concat(S.fysCatalog);
  const def=all.find(c=>c.id===ex.exerciseId);
  const name=def?def.name:(ex.customName||'Fri øvelse');
  const tags=def?(def.tags||[]):[];
  const sec=S.draft?.sections[si];
  const total=(sec?.exercises||[]).length;
  return `<div class="ex-row${ex.done?' done':''}">
    <span class="ex-check${ex.done?' checked':''}" data-excheck="${si}-${ei}" title="Afkryds øvelse">${ex.done?'✓':''}</span>
    <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0;">
      <button class="btn btn-ghost btn-xs" style="padding:1px 5px;font-size:11px;line-height:1;${ei===0?'opacity:.25;cursor:default;':''}" data-moveex="${si}-${ei}-up" ${ei===0?'disabled':''}>▲</button>
      <button class="btn btn-ghost btn-xs" style="padding:1px 5px;font-size:11px;line-height:1;${ei===total-1?'opacity:.25;cursor:default;':''}" data-moveex="${si}-${ei}-down" ${ei===total-1?'disabled':''}>▼</button>
    </div>
    <div class="ex-row-name" style="flex:1;">
      <div style="font-weight:500;line-height:1.3;cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;" data-exdetail="${ex.exerciseId||''}">${esc(name)}</div>
      ${tags.length?`<div class="tags-wrap" style="margin-top:3px;">${tags.map(tg=>`<span class="tag">${esc(tg)}</span>`).join('')}</div>`:''}
    </div>
    <button class="btn btn-danger btn-xs" data-delex="${si}-${ei}">✕</button>
  </div>`;
}

// ─── KATALOG ──────────────────────────────────────────────────────────────────
function renderCatRows(filtered, cat) {
  if(filtered.length===0) return `<div class="empty"><div class="empty-icon">🏋️</div><p>${(cat||[]).length===0?'Importer øvelser fra Excel/CSV':'Ingen resultater'}</p></div>`;
  return filtered.slice(0,120).map(ex=>`
    <div class="cat-row" data-editex="${ex.id}">
      <div style="font-weight:600;font-size:13px;">${esc(ex.name)}</div>
      <div class="cat-col-desc" style="font-size:12px;color:var(--text2);">${ex.description?esc(ex.description.substring(0,80))+(ex.description.length>80?'…':''):(ex.variants?esc(ex.variants.substring(0,80))+(ex.variants.length>80?'…':''):'')}</div>
      <div class="cat-col-stars stars-sm">${ex.stars?'★'.repeat(ex.stars)+'☆'.repeat(5-ex.stars):'–'}</div>
      <div class="tags-wrap">${(ex.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}${(ex.tags||[]).length>3?`<span class="tag">+${ex.tags.length-3}</span>`:''}</div>
      <div>${ex.link?`<a href="${esc(ex.link)}" target="_blank" style="color:var(--blue);font-size:12px;text-decoration:none;border-bottom:1px solid rgba(59,130,246,0.4);" onclick="event.stopPropagation()">Link ↗</a>`:''}</div>
      <div><button class="btn btn-danger btn-xs" data-delexcat="${ex.id}" onclick="event.stopPropagation()">✕</button></div>
    </div>`).join('')
  + (filtered.length>120?`<div style="padding:10px;text-align:center;color:var(--text2);font-size:12px;">Viser 120 af ${filtered.length} – søg for at filtrere</div>`:'');
}

function html_katalog_tab() {
  const cat=S.catTab==='hal'?S.halCatalog:S.fysCatalog;
  const q=S.catSearch.toLowerCase(), tf=S.catFilter.tags, sf=S.catFilter.stars;
  const filtered=cat.filter(ex=>{
    if(q&&!ex.name.toLowerCase().includes(q)&&!(ex.variants||'').toLowerCase().includes(q)) return false;
    if(tf.length&&!tf.every(t=>(ex.tags||[]).includes(t))) return false;
    if(sf&&(ex.stars||0)<sf) return false;
    return true;
  });
  const allTags=[...new Set(cat.flatMap(e=>e.tags||[]))].sort();
  return `<div style="max-width:1060px;margin:0 auto;">
    <div class="flex-between" style="margin-bottom:18px;flex-wrap:wrap;gap:10px;">
      <h1 style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:.04em;">ØVELSESKATALOG</h1>
      <div class="flex-row" style="flex-wrap:wrap;gap:6px;">
        <button class="btn btn-secondary" id="importBtn">📥 Import</button>
        <div style="position:relative;display:inline-flex;">
          <button class="btn btn-ghost" id="exportMenuBtn">⬇ Export ▾</button>
          <div id="export-menu" style="display:none;position:absolute;top:100%;right:0;z-index:50;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;box-shadow:0 8px 24px rgba(0,0,0,.5);margin-top:3px;min-width:130px;overflow:hidden;">
            <div id="exportCsvBtn" style="padding:9px 14px;cursor:pointer;font-size:13px;" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">⬇ CSV</div>
            <div id="exportXlsxBtn" style="padding:9px 14px;cursor:pointer;font-size:13px;" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">⬇ Excel (.xls)</div>
          </div>
        </div>
        <button class="btn btn-primary" id="newExBtn">+ Ny øvelse</button>
      </div>
    </div>
    <div class="subtabs">
      <button class="subtab${S.catTab==='hal'?' active':''}" data-ctab="hal">Haltræning <span style="color:var(--text3);font-size:11px;">(${S.halCatalog.length})</span></button>
      <button class="subtab${S.catTab==='fys'?' active':''}" data-ctab="fys">Fysisk træning <span style="color:var(--text3);font-size:11px;">(${S.fysCatalog.length})</span></button>
    </div>
    <div class="flex-row" style="margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div class="search-wrap" style="flex:1;min-width:180px;"><span class="search-ico">🔍</span><input id="catQ" value="${esc(S.catSearch)}" placeholder="Søg øvelse…"></div>
      <select id="catStar" style="width:130px;"><option value="0">Alle stjerner</option>${[1,2,3,4,5].map(n=>`<option value="${n}" ${sf===n?'selected':''}>${'★'.repeat(n)}+</option>`).join('')}</select>
    </div>
    ${allTags.length?`<div style="margin-bottom:12px;"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Tags</div><div class="pill-group">${allTags.map(t=>`<button class="pill btn-sm${tf.includes(t)?' active':''}" data-ctag="${esc(t)}">${esc(t)}</button>`).join('')}</div></div>`:''}
    <div class="card">
      <div class="cat-row cat-hdr"><div>Navn</div><div class="cat-col-desc">Beskrivelse</div><div class="cat-col-stars">Stjerner</div><div>Tags</div><div>Link</div><div></div></div>
      <div id="catTableBody">${renderCatRows(filtered,cat)}</div>
    </div>
  </div>`;
}

// ─── ARKIV ────────────────────────────────────────────────────────────────────
function html_arkiv_tab() {
  const arch=S.trainings.filter(t=>t.archived);
  const {stars:sf,trainer:tf,loc:lf}=S.archFilter;
  const filtered=arch.filter(t=>{
    if(sf&&(t.stars||0)<sf) return false;
    if(tf&&!(t.trainers||[]).includes(tf)) return false;
    if(lf&&t.location!==lf) return false;
    return true;
  }).sort((a,b)=>b.date>a.date?1:-1);
  return `<div style="max-width:960px;margin:0 auto;">
    <div class="flex-between" style="margin-bottom:18px;flex-wrap:wrap;gap:10px;">
      <div><h1 style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:.04em;">ARKIV</h1>
      <p style="color:var(--text2);font-size:12px;">${arch.length} afholdte træninger</p></div>
    </div>
    <div class="flex-row" style="margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <select id="archStar" style="width:140px;"><option value="0">Alle vurderinger</option>${[1,2,3,4,5].map(n=>`<option value="${n}" ${sf===n?'selected':''}>${'★'.repeat(n)}+</option>`).join('')}</select>
      <select id="archLoc"  style="width:130px;"><option value="">Alle steder</option>${LOCATIONS.map(l=>`<option value="${l}" ${lf===l?'selected':''}>${l}</option>`).join('')}</select>
      <select id="archTr"   style="width:140px;"><option value="">Alle trænere</option>${TRAINERS.map(tr=>`<option value="${tr}" ${tf===tr?'selected':''}>${tr}</option>`).join('')}</select>
    </div>
    ${filtered.length===0?`<div class="empty"><div class="empty-icon">📁</div><p>Ingen arkiverede træninger</p></div>`
      :`<table class="arch-tbl"><thead><tr><th>Dato</th><th>Træning</th><th class="hide-mobile">Sted</th><th class="hide-mobile">Varighed</th><th class="hide-mobile">Trænere</th><th>Vurdering</th><th></th></tr></thead><tbody>
      ${filtered.map(t=>`<tr>
        <td style="color:var(--text2);white-space:nowrap;">${t.date||'–'}</td>
        <td><div style="font-weight:500;">${trainingLabel(t)}</div>${t.focusPoints?`<div style="font-size:11px;color:var(--text2);">🎯 ${esc(t.focusPoints)}</div>`:''}</td>
        <td class="hide-mobile">${t.location?`<span class="loc-chip ${LOC_CLS[t.location]||''}">${t.location}</span>`:''}</td>
        <td class="hide-mobile"><span style="background:var(--bg4);padding:2px 6px;border-radius:3px;font-size:11px;">${durMin(t.startTime,t.endTime)} min</span></td>
        <td class="hide-mobile" style="white-space:nowrap;">${(t.trainers||[]).map(tr=>`<span style="background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd;padding:1px 5px;border-radius:3px;font-size:11px;">${tr}</span>`).join(' ')}</td>
        <td class="stars-sm">${t.stars?'★'.repeat(t.stars)+'☆'.repeat(5-t.stars):'–'}</td>
        <td style="white-space:nowrap;">
          <button class="btn btn-secondary btn-xs" data-clone="${t.id}">Kopi</button>
          <button class="btn btn-ghost btn-xs" data-restore="${t.id}">Genskab</button>
          <button class="btn btn-danger btn-xs" data-deltrain="${t.id}">✕</button>
        </td>
      </tr>`).join('')}</tbody></table>`}
  </div>`;
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function html_modal() {
  const m=S.modal;
  if(m.type==='addSec')   return mwrap(mhead('Tilføj sektion')+`<div class="modal-body"><div class="grid-2">${SECTIONS.map(s=>`<button class="list-item" style="border-left:3px solid ${s.color};" data-picksec="${s.id}"><div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:${s.color};">${s.label}</div></button>`).join('')}</div></div>`);
  if(m.type==='pickEx')   return html_m_pickex();
  if(m.type==='editEx'||m.type==='newEx') return html_m_editex(m.type==='editEx'?m.ex:null);
  if(m.type==='import')   return html_m_import();
  if(m.type==='exDetail') return html_m_exdetail(m.ex);
  if(m.type==='custEx')  return html_m_custem(m.si);
  if(m.type==='saveTmpl') return mwrap(mhead('Gem som skabelon')+`<div class="modal-body"><div class="form-group"><label>Navn</label><input id="tmpl-n" placeholder="fx Standard tirsdagstræning" autofocus></div></div><div class="modal-footer"><button class="btn btn-ghost mclose">Annuller</button><button class="btn btn-primary" id="confirmTmpl">Gem</button></div>`,'modal-sm');
  if(m.type==='fromTmpl') return mwrap(mhead('Ny træning')+`<div class="modal-body"><button class="list-item" style="border:2px dashed var(--border2);margin-bottom:8px;width:100%;" data-usetmpl="blank"><div class="list-title">📋 Start fra bunden</div></button>${S.templates.length===0?`<p style="color:var(--text3);text-align:center;padding:14px;font-size:13px;">Ingen skabeloner endnu</p>`:S.templates.map(t=>`<div class="flex-between list-item" style="margin-bottom:6px;" data-usetmpl="${t.id}"><div><div class="list-title">${esc(t.name)}</div><div class="list-meta">${(t.sections||[]).length} sektioner</div></div><button class="btn btn-danger btn-xs" data-deltmpl="${t.id}" onclick="event.stopPropagation()">✕</button></div>`).join('')}</div>`,'modal-sm');
  return '';
}
function mwrap(inner,size=''){return `<div class="modal-overlay" id="moverlay"><div class="modal ${size}">${inner}</div></div>`;}
function mhead(title){return `<div class="modal-header"><span class="modal-title">${title}</span><button class="btn btn-ghost btn-sm" id="mclose">✕</button></div>`;}

function renderPickList(f, si) {
  if(f.length===0) return `<div class="empty" style="padding:20px;"><p>Ingen resultater</p></div>`;
  return f.slice(0,80).map(ex=>`<div class="list-item" style="margin-bottom:5px;" data-pickex="${ex.id}" data-si="${si}">
    <div class="list-title">${esc(ex.name)}</div>
    <div class="list-meta">${(ex.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
  </div>`).join('')
  + (f.length>80?`<div style="text-align:center;color:var(--text3);font-size:12px;padding:8px;">Viser 80 af ${f.length}</div>`:'');
}

function html_m_pickex() {
  const si=S.modal.si, q=(S.modal.q||'').toLowerCase();
  const tf=S.modal.tags||[];
  const all=S.halCatalog.concat(S.fysCatalog);
  const allTags=[...new Set(all.flatMap(e=>e.tags||[]))].sort();
  const f=all.filter(ex=>{
    if(q&&!ex.name.toLowerCase().includes(q)&&!(ex.tags||[]).some(t=>t.toLowerCase().includes(q)))return false;
    if(tf.length&&!tf.every(t=>(ex.tags||[]).includes(t)))return false;
    return true;
  });
  return mwrap(mhead('Vælg øvelse')+`<div class="modal-body">
    <div class="search-wrap" style="margin-bottom:8px;"><span class="search-ico">🔍</span><input id="exPickQ" value="${esc(S.modal.q||'')}" placeholder="Søg på navn eller tag…" autofocus></div>
    <div class="pill-group" style="margin-bottom:10px;" id="exPickTags">${allTags.map(t=>`<button class="pill btn-xs${tf.includes(t)?' active':''}" data-picktag="${esc(t)}">${esc(t)}</button>`).join('')}</div>
    <div style="max-height:360px;overflow-y:auto;" id="exPickList">
      ${all.length===0?`<div class="empty" style="padding:20px;"><p>Ingen øvelser – importer katalog</p></div>`:renderPickList(f,si)}
    </div>
    <hr class="divider"><button class="btn btn-ghost btn-sm" data-custex="${si}">+ Tilføj fri øvelse</button>
  </div>`,'modal-lg');
}

// ─── BIND ─────────────────────────────────────────────────────────────────────
// Event delegation for dynamically re-rendered pick list
document.addEventListener('click', e=>{
  const el=e.target.closest('[data-pickex]');
  if(el && S.draft && S.modal?.type==='pickEx'){
    S.draft.sections[+el.dataset.si].exercises.push({exerciseId:el.dataset.pickex,mins:10});
    S.modal=null;render();
  }
});

function requireUnlock(action) {
  if (S.unlocked) { action(); return; }
  const pw = prompt('Indtast kodeord:');
  if (pw === null) return;
  if (pw.trim() === 'Ajax 321') { S.unlocked = true; render(); action(); }
  else { toast('Forkert kodeord', 'err'); }
}
function bind() {
  on('[data-tab]',    el=>{S.tab=el.dataset.tab;render();});
  ge('aarshjulLockBtn')?.addEventListener('click',()=>{S.aarshjulLocked=!S.aarshjulLocked;render();});
  on('[data-qadd]',   el=>{const qi=+el.dataset.qadd;if((S.quarters[qi].themes||[]).length<6){S.quarters[qi].themes.push('');scheduleSave('quarters');render();}});
  on('[data-qdel]',   el=>{const[qi,ti]=el.dataset.qdel.split('-').map(Number);S.quarters[qi].themes.splice(ti,1);scheduleSave('quarters');render();});
  live('[data-qt]',   el=>{if(S.aarshjulLocked)return;const[qi,ti]=el.dataset.qt.split('-').map(Number);S.quarters[qi].themes[ti]=el.value;scheduleSave('quarters');});
  on('[data-open]',   el=>{if(!event.target.closest('[data-edit],[data-arch]')){const t=S.trainings.find(x=>x.id===el.dataset.open);if(t){S.draft=JSON.parse(JSON.stringify(t));render();}}});
  on('[data-edit]',   el=>{const t=S.trainings.find(x=>x.id===el.dataset.edit);if(t){S.draft=JSON.parse(JSON.stringify(t));render();}});
  on('[data-arch]',   el=>{const t=S.trainings.find(x=>x.id===el.dataset.arch);if(t){t.archived=true;scheduleSave('trainings');toast('Arkiveret');render();}});
  on('[data-deltrain]',el=>{const id=el.dataset.deltrain;if(!confirm('Slet træning permanent?'))return;S.trainings=S.trainings.filter(x=>x.id!==id);scheduleSave('trainings');toast('Træning slettet');render();});
  ge('newTBtn')?.addEventListener('click',()=>requireUnlock(()=>{S.draft={id:uid(),title:'',date:'',startTime:'',endTime:'',location:'',trainers:[],sections:[],stars:0};render();}));
  ge('fromTmplBtn')?.addEventListener('click',()=>{S.modal={type:'fromTmpl'};render();});
  ge('unlockBtn')?.addEventListener('click',()=>{
    if(S.unlocked){S.unlocked=false;render();toast('Låst igen');}
    else requireUnlock(()=>{toast('Låst op ✓');});
  });
  ge('cancelBtn')?.addEventListener('click',()=>{S.draft=null;render();});
  ge('archTBtn')?.addEventListener('click',()=>requireUnlock(()=>{const t=S.trainings.find(x=>x.id===S.draft.id);if(t){t.archived=true;S.draft=null;scheduleSave('trainings');toast('Arkiveret');render();}}));
  ge('delTBtn')?.addEventListener('click',()=>requireUnlock(()=>{if(!confirm('Slet træning permanent?'))return;S.trainings=S.trainings.filter(x=>x.id!==S.draft.id);S.draft=null;scheduleSave('trainings');toast('Træning slettet');render();}));
  ge('saveTBtn')?.addEventListener('click',()=>requireUnlock(saveTraining));
  ge('saveTmplBtn')?.addEventListener('click',()=>{S.modal={type:'saveTmpl'};render();});
  on('[data-loc]',    el=>{if(!S.draft)return;S.draft.location=S.draft.location===el.dataset.loc?'':el.dataset.loc;
    document.querySelectorAll('[data-loc]').forEach(p=>p.classList.toggle('active',p.dataset.loc===S.draft.location));
  });
  ge('e-lead')?.addEventListener('change',function(){
    if(!S.draft) return;
    S.draft.leadTrainer = this.value;
    if(this.value && !(S.draft.trainers||[]).includes(this.value)){
      if(!S.draft.trainers) S.draft.trainers=[];
      S.draft.trainers.push(this.value);
      // refresh tr-display
      const disp=ge('tr-display');
      if(disp){
        const pills=S.draft.trainers.map(tr=>`<span style="background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35);color:#93c5fd;padding:2px 8px;border-radius:3px;font-size:12px;font-weight:500;">${tr}</span>`).join('');
        disp.innerHTML=pills+'<span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;">▾</span>';
      }
    }
  });
  if(!document._trOptBound){document._trOptBound=true;document.addEventListener('click',e=>{
    const el=e.target.closest('[data-tr-opt]');
    if(!el||!S.draft)return;
    const tr=el.dataset.trOpt;
    if(!S.draft.trainers)S.draft.trainers=[];
    const i=S.draft.trainers.indexOf(tr);
    i>=0?S.draft.trainers.splice(i,1):S.draft.trainers.push(tr);
    // Update checkbox in dropdown
    const chk=el.querySelector('span');
    const sel=S.draft.trainers.includes(tr);
    if(chk){chk.style.background=sel?'var(--accent)':'transparent';chk.style.borderColor=sel?'var(--accent)':'var(--border2)';chk.textContent=sel?'✓':'';}
    // Update display pills
    const disp=ge('tr-display');
    if(disp){
      const pills=S.draft.trainers.length===0
        ?'<span style="color:var(--text3);font-size:13px;">Vælg trænere…</span>'
        :S.draft.trainers.map(t=>`<span style="background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35);color:#93c5fd;padding:2px 8px;border-radius:3px;font-size:12px;font-weight:500;">${t}</span>`).join('');
      disp.innerHTML=pills+'<span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;">▾</span>';
    }
  });}
  on('[data-etheme]', el=>{if(!S.draft)return;if(!S.draft.themes)S.draft.themes=[];const th=el.dataset.etheme;const i=S.draft.themes.indexOf(th);i>=0?S.draft.themes.splice(i,1):S.draft.themes.push(th);
    el.classList.toggle('active', S.draft.themes.includes(th));
    const summary=el.closest('.form-group')?.querySelector('p');
    if(summary) summary.textContent=S.draft.themes.join(' · ')||'Ingen valgt';
  });
  on('[data-estr]',   el=>{if(!S.draft)return;S.draft.stars=+el.dataset.estr;
    document.querySelectorAll('[data-estr]').forEach(s=>s.classList.toggle('filled',+s.dataset.estr<=S.draft.stars));
  });
  ['e-start','e-end'].forEach(id=>{ge(id)?.addEventListener('change',function(){S.draft[id==='e-start'?'startTime':'endTime']=this.value;
    const dur=durMin(S.draft.startTime,S.draft.endTime),tot=totalMins(S.draft);
    const mc=tot>dur?'mins-over':tot>dur*.9?'mins-warn':'mins-ok';
    const el=ge('total-mins-display');
    if(el) el.innerHTML='Varighed: <strong style="font-size:16px;">'+(dur>0?dur+' min':'–')+'</strong> &nbsp;·&nbsp; Planlagt: <strong class="'+mc+'" style="font-size:16px;">'+tot+' min</strong>'+(tot>dur&&dur>0?'<span style="color:var(--red);font-weight:600;"> ⚠ '+(tot-dur)+' over</span>':'');
  });});
  live('[data-secmins]', el=>{const si=+el.dataset.secmins;if(S.draft?.sections[si]!=null){S.draft.sections[si].mins=parseInt(el.value)||0;updateTotalMins();}});
  ge('addSecBtn')?.addEventListener('click',()=>{S.modal={type:'addSec'};render();});
  on('[data-picksec]',el=>{if(!S.draft.sections)S.draft.sections=[];S.draft.sections.push({type:el.dataset.picksec,exercises:[]});S.modal=null;render();});
  on('[data-delsec]', el=>{S.draft.sections.splice(+el.dataset.delsec,1);renderSecs();});
  // collapse handled by document delegation
  document.addEventListener('change',e=>{const el=e.target.closest('[data-grpsel]');if(!el||!S.draft)return;const s=S.draft.sections[+el.dataset.grpsel];if(s){s.group=el.value||undefined;renderSecs();}});
  // addex handled by document delegation
  bindPickList();
  on('[data-custex]', el=>{S.modal={type:'custEx',si:+el.dataset.custex};render();});
  on('[data-delex]',  el=>{const[si,ei]=el.dataset.delex.split('-').map(Number);S.draft.sections[si].exercises.splice(ei,1);renderSecs();});
  // Document-level delegation for all section/exercise operations that need DOM-only updates
  if(!document._exCheckBound){document._exCheckBound=true;document.addEventListener('click',e=>{
    const el=e.target.closest('[data-excheck]');
    if(!el||!S.draft)return;
    e.stopPropagation();
    const[si,ei]=el.dataset.excheck.split('-').map(Number);
    const ex=S.draft.sections[si]?.exercises[ei];
    if(!ex)return;
    ex.done=!ex.done;
    scheduleSave('trainings');
    // Update checkbox
    el.classList.toggle('checked',ex.done);
    el.textContent=ex.done?'✓':'';
    // Update ex-row strikethrough
    el.closest('.ex-row').classList.toggle('done',ex.done);
    // Update section done indicator
    const secEl=el.closest('[data-si]');
    if(secEl){
      const sec=S.draft.sections[si];
      const exs=sec.exercises||[];
      const doneCount=exs.filter(e=>e.done).length;
      const badge=secEl.querySelector('.sec-done-badge,.sec-progress');
      const label=secEl.querySelector('.sec-label');
      if(label){
        let ind=label.nextElementSibling;
        // Remove old indicator
        if(ind&&(ind.classList.contains('sec-done-badge')||ind.classList.contains('sec-progress'))){ind.remove();ind=null;}
        if(exs.length){
          const span=document.createElement('span');
          if(doneCount===exs.length){span.className='sec-done-badge';span.textContent='✓ Færdig';}
          else{span.className='sec-progress';span.style.cssText='font-size:11px;color:var(--text3);';span.textContent=doneCount+'/'+exs.length;}
          label.insertAdjacentElement('afterend',span);
        }
      }
    }
  });}
if(!document._secDelegBound){document._secDelegBound=true;document.addEventListener('click',e=>{
    // ── movesec ──────────────────────────────────────────────────
    const msEl=e.target.closest('[data-movesec]');
    if(msEl&&S.draft){
      e.stopPropagation();
      const [si,dir]=msEl.dataset.movesec.split('-');
      const secs=S.draft.sections, i=+si, t=dir==='up'?i-1:i+1;
      if(t>=0&&t<secs.length){[secs[i],secs[t]]=[secs[t],secs[i]];renderSecs();}
      return;
    }
    // ── collapse ─────────────────────────────────────────────────
    const colEl=e.target.closest('[data-collapse]');
    if(colEl&&S.draft&&!e.target.closest('[data-movesec],[data-addex],[data-delsec],[data-par],[data-secmins]')){
      const si=+colEl.dataset.collapse;
      if(S.draft.sections[si]!=null){S.draft.sections[si].collapsed=!S.draft.sections[si].collapsed;renderSecs();}
      return;
    }
    // ── moveex ───────────────────────────────────────────────────
    const mxEl=e.target.closest('[data-moveex]');
    if(mxEl&&S.draft){
      const parts=mxEl.dataset.moveex.split('-');
      const si=+parts[0],ei=+parts[1],dir=parts[2];
      const exs=S.draft.sections[si]?.exercises;
      if(!exs)return;
      const target=dir==='up'?ei-1:ei+1;
      if(target<0||target>=exs.length)return;
      [exs[ei],exs[target]]=[exs[target],exs[ei]];
      const body=document.getElementById(`sbd-${si}`);
      if(body) body.innerHTML=exs.map((ex,i)=>html_exrow(ex,si,i)).join('')+(exs.length?'':'<p style="color:var(--text3);font-size:12px;">Ingen øvelser</p>');
      else renderSecs();
      return;
    }
    // ── addex (add exercise — preserve scroll) ───────────────────
    const axEl=e.target.closest('[data-addex]');
    if(axEl&&S.draft){
      e.stopPropagation();
      const scrollY=window.scrollY;
      S.modal={type:'pickEx',si:+axEl.dataset.addex,q:'',tags:[]};
      render();
      requestAnimationFrame(()=>window.scrollTo({top:scrollY,behavior:'instant'}));
      return;
    }
  });} // end _secDelegBound

  on('[data-picktag]', el=>{
    if(!S.modal||S.modal.type!=='pickEx') return;
    const t=el.dataset.picktag;
    if(!S.modal.tags) S.modal.tags=[];
    const i=S.modal.tags.indexOf(t);
    i>=0?S.modal.tags.splice(i,1):S.modal.tags.push(t);
    // Update tags UI
    document.querySelectorAll('[data-picktag]').forEach(b=>b.classList.toggle('active',S.modal.tags.includes(b.dataset.picktag)));
    // Update list
    const all=S.halCatalog.concat(S.fysCatalog);
    const q=(S.modal.q||'').toLowerCase();
    const tf=S.modal.tags;
    const f=all.filter(ex=>{
      if(q&&!ex.name.toLowerCase().includes(q)&&!(ex.tags||[]).some(t=>t.toLowerCase().includes(q)))return false;
      if(tf.length&&!tf.every(t=>(ex.tags||[]).includes(t)))return false;
      return true;
    });
    const wrap=document.getElementById('exPickList');
    if(wrap){wrap.innerHTML=renderPickList(f,S.modal.si);bindPickList();}
  });
  ge('exPickQ')?.addEventListener('input',function(){
    S.modal.q=this.value;
    // Update list without re-rendering (avoids losing focus)
    const all=S.halCatalog.concat(S.fysCatalog);
    const q=this.value.toLowerCase();
    const tf=S.modal.tags||[];
    const f=all.filter(ex=>{
      if(q&&!ex.name.toLowerCase().includes(q)&&!(ex.tags||[]).some(t=>t.toLowerCase().includes(q)))return false;
      if(tf.length&&!tf.every(t=>(ex.tags||[]).includes(t)))return false;
      return true;
    });
    const wrap=document.getElementById('exPickList');
    if(wrap) wrap.innerHTML=renderPickList(f,S.modal.si);
  });
  on('[data-ctab]',   el=>{S.catTab=el.dataset.ctab;S.catSearch='';S.catFilter={tags:[],stars:0};render();});
  ge('catQ')?.addEventListener('input',function(){
    S.catSearch=this.value;
    const q=this.value.toLowerCase();
    const tf=S.catFilter.tags, sf=S.catFilter.stars;
    const cat=S.catTab==='hal'?S.halCatalog:S.fysCatalog;
    const filtered=cat.filter(ex=>{
      if(q&&!ex.name.toLowerCase().includes(q)&&!(ex.variants||'').toLowerCase().includes(q))return false;
      if(tf.length&&!tf.every(t=>(ex.tags||[]).includes(t)))return false;
      if(sf&&(ex.stars||0)<sf)return false;
      return true;
    });
    const wrap=document.getElementById('catTableBody');
    if(wrap) wrap.innerHTML=renderCatRows(filtered,cat);
  });
  ge('catStar')?.addEventListener('change',function(){S.catFilter.stars=+this.value;render();});
  on('[data-ctag]',   el=>{const t=el.dataset.ctag;const i=S.catFilter.tags.indexOf(t);i>=0?S.catFilter.tags.splice(i,1):S.catFilter.tags.push(t);render();});
  ge('newExBtn')?.addEventListener('click',()=>requireUnlock(()=>{S.modal={type:'newEx'};render();}));
  ge('importBtn')?.addEventListener('click',()=>requireUnlock(()=>{S.modal={type:'import'};render();}));
  // Export menu — document delegation so it works after render
  if(!document._exportMenuBound){document._exportMenuBound=true;
    document.addEventListener('click',e=>{
      if(e.target.closest('#exportMenuBtn')){e.stopPropagation();const m=ge('export-menu');if(m)m.style.display=m.style.display==='none'?'block':'none';return;}
      if(e.target.closest('#exportCsvBtn')){const m=ge('export-menu');if(m)m.style.display='none';exportCatalog('csv');return;}
      if(e.target.closest('#exportXlsxBtn')){const m=ge('export-menu');if(m)m.style.display='none';exportCatalog('xlsx');return;}
      // close on outside click
      if(!e.target.closest('#export-menu')){const m=ge('export-menu');if(m)m.style.display='none';}
    });
  }
  if(!document._exdetailBound){document._exdetailBound=true;document.addEventListener('click',e=>{
    const el=e.target.closest('[data-exdetail]');
    if(!el)return;
    const id=el.dataset.exdetail; if(!id) return;
    const all=S.halCatalog.concat(S.fysCatalog);
    const ex=all.find(e=>e.id===id);
    if(ex){e.stopPropagation();S.modal={type:'exDetail',ex};render();}
  });}
  on('[data-editex]', el=>{const all=S.halCatalog.concat(S.fysCatalog);const ex=all.find(e=>e.id===el.dataset.editex);if(ex){S.modal={type:'editEx',ex};render();}});
  on('[data-delexcat]',el=>requireUnlock(()=>{const id=el.dataset.delexcat;S.halCatalog=S.halCatalog.filter(e=>e.id!==id);S.fysCatalog=S.fysCatalog.filter(e=>e.id!==id);scheduleSave(S.catTab==='hal'?'hal':'fys');render();}));
  on('[data-exs]',    el=>{document.querySelectorAll('[data-exs]').forEach((s,i)=>s.classList.toggle('filled',i<+el.dataset.exs));});
  on('[data-saveex]', el=>requireUnlock(()=>saveExercise(el.dataset.saveex)));
  on('[data-savecex]',el=>{
    const si=+el.dataset.savecex;
    const n=document.getElementById('cex-n')?.value?.trim();
    if(!n){toast('Navn mangler','err');return;}
    const addToCat=document.getElementById('cex-addcat')?.checked;
    const ex={exerciseId:null,customName:n,mins:10};
    S.draft.sections[si].exercises.push(ex);
    if(addToCat){
      const d=document.getElementById('cex-d')?.value||'';
      const tags=(document.getElementById('cex-t')?.value||'').split(',').map(x=>x.trim()).filter(Boolean);
      const cat=document.getElementById('cex-cat')?.value||'hal';
      const newEx={id:uid(),name:n,description:d,stars:0,tags,variants:'',link:'',catalog:cat};
      if(cat==='hal')S.halCatalog.push(newEx);else S.fysCatalog.push(newEx);
      ex.exerciseId=newEx.id; ex.customName=undefined;
      scheduleSave(cat);
      toast(`"${n}" tilføjet til katalog`);
    }
    S.modal=null;render();
  });
  ge('cex-addcat')?.addEventListener('change',function(){
    const opts=document.getElementById('cex-cat-opts');
    if(opts) opts.style.display=this.checked?'block':'none';
  });
  bindImport();
  ge('archStar')?.addEventListener('change',function(){S.archFilter.stars=+this.value;render();});
  ge('archLoc')?.addEventListener('change',function(){S.archFilter.loc=this.value;render();});
  ge('archTr')?.addEventListener('change',function(){S.archFilter.trainer=this.value;render();});
  on('[data-clone]',  el=>{const t=S.trainings.find(x=>x.id===el.dataset.clone);if(!t)return;const c=JSON.parse(JSON.stringify(t));c.id=uid();c.archived=false;c.date='';c.stars=0;c.title=(c.title||'Træning')+' (kopi)';S.draft=c;S.tab='traening';render();});
  on('[data-restore]',el=>requireUnlock(()=>{const t=S.trainings.find(x=>x.id===el.dataset.restore);if(t){t.archived=false;scheduleSave('trainings');toast('Genskabt');render();}}));
  on('[data-deltrain]',el=>requireUnlock(()=>{if(confirm('Slet permanent?')){S.trainings=S.trainings.filter(x=>x.id!==el.dataset.deltrain);scheduleSave('trainings');render();}}));
  ge('confirmTmpl')?.addEventListener('click',()=>{const n=v('tmpl-n')?.trim();if(!n){toast('Navn mangler','err');return;}S.templates.push({id:uid(),name:n,sections:JSON.parse(JSON.stringify(S.draft.sections||[]))});lsSave('templates',S.templates);toast(`Skabelon "${n}" gemt`);S.modal=null;render();});
  on('[data-usetmpl]',el=>{const tid=el.dataset.usetmpl;const nt={id:uid(),title:'',date:'',startTime:'',endTime:'',location:'',trainers:[],sections:[],stars:0};if(tid!=='blank'){const tm=S.templates.find(t=>t.id===tid);if(tm)nt.sections=JSON.parse(JSON.stringify(tm.sections||[]));}S.draft=nt;S.modal=null;S.tab='traening';render();});
  on('[data-deltmpl]',el=>{S.templates=S.templates.filter(t=>t.id!==el.dataset.deltmpl);lsSave('templates',S.templates);render();});
  ge('mclose')?.addEventListener('click',()=>{S.modal=null;render();});
  document.querySelectorAll('.mclose').forEach(el=>el.addEventListener('click',()=>{S.modal=null;render();}));
  ge('moverlay')?.addEventListener('click',e=>{if(e.target.id==='moverlay'){S.modal=null;render();}});
}

function saveTraining() {
  const t=S.draft;
  t.date=v('e-date'); t.startTime=v('e-start'); t.endTime=v('e-end'); t.leadTrainer=v('e-lead')||'';
  t.title=trainingLabel(t);
  t.focusPoints=v('e-focus'); t.notes=v('e-notes');
  document.querySelectorAll('[data-secmins]').forEach(inp=>{
    const si=+inp.dataset.secmins;
    if(t.sections[si]) t.sections[si].mins=parseInt(inp.value)||0;
  });
  const idx=S.trainings.findIndex(x=>x.id===t.id);
  if(idx>=0)S.trainings[idx]=t;else S.trainings.push(t);
  scheduleSave('trainings');
  toast('Træning gemt ✓');
  S.draft=null;render();
}

function saveExercise(exId) {
  const n=v('ex-n')?.trim();if(!n){toast('Navn mangler','err');return;}
  const stars=document.querySelectorAll('#ex-stars .star.filled').length;
  const catalog=v('ex-cat')||'hal';
  const ex={id:exId!=='new'?exId:uid(),name:n,stars,catalog,
    description:v('ex-d')||'',tags:(v('ex-t')||'').split(',').map(x=>x.trim()).filter(Boolean),
    variants:v('ex-v')||'',link:v('ex-l')||''};
  const arr=catalog==='hal'?S.halCatalog:S.fysCatalog;
  const idx=arr.findIndex(e=>e.id===ex.id);
  if(idx>=0)arr[idx]=ex;else arr.push(ex);
  scheduleSave(catalog);
  toast('Øvelse gemt ✓');S.modal=null;render();
}

function bindPickList() {
  document.querySelectorAll('[data-pickex]').forEach(el=>{
    el.addEventListener('click', ()=>{
      S.draft.sections[+el.dataset.si].exercises.push({exerciseId:el.dataset.pickex,mins:10});
      S.modal=null;render();
    });
  });
}

function bindImport() {
  const dz=ge('dropZ');
  if(dz){
    dz.addEventListener('click',()=>ge('impFile')?.click());
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');handleImport(e.dataTransfer.files[0]);});
  }
  ge('impFile')?.addEventListener('change',function(){handleImport(this.files[0]);});
}

function handleImport(file) {
  if(!file)return;
  const ct=v('imp-cat')||'hal', st=ge('impStatus');
  if(st)st.innerHTML='<span style="color:var(--yellow);">Indlæser…</span>';
  if(file.name.endsWith('.csv')){
    const r=new FileReader();r.onload=e=>applyImport(parseCSV(e.target.result,ct),ct,st);r.readAsText(file,'UTF-8');
  } else {
    const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];applyImport(parseRows(XLSX.utils.sheet_to_json(ws,{header:1,defval:''}),ct),ct,st);}catch(err){if(st)st.innerHTML=`<span style="color:var(--red);">Fejl: ${err.message}</span>`;}};r.readAsArrayBuffer(file);
  }
}
function parseCSV(text,cat){return text.split('\n').filter(l=>l.trim()).slice(1).map(line=>{const c=line.split(',').map(x=>x.trim().replace(/^"|"$/g,''));return{id:uid(),catalog:cat,name:c[0]||'',description:c[1]||'',stars:Math.min(5,Math.max(0,parseInt(c[2])||0)),tags:(c[3]||'').split(';').map(x=>x.trim()).filter(Boolean),variants:c[4]||'',link:c[5]||''};}).filter(e=>e.name);}
function parseRows(rows,cat){const skip=isNaN(rows[0]?.[2])?1:0;return rows.slice(skip).map(c=>({id:uid(),catalog:cat,name:String(c[0]||'').trim(),description:String(c[1]||'').trim(),stars:Math.min(5,Math.max(0,parseInt(c[2])||0)),tags:String(c[3]||'').split(';').map(x=>x.trim()).filter(Boolean),variants:String(c[4]||'').trim(),link:String(c[5]||'').trim()})).filter(e=>e.name);}
function applyImport(exs,ct,st){
  if(!exs.length){if(st)st.innerHTML='<span style="color:var(--red);">Ingen øvelser fundet</span>';return;}
  const arr=ct==='hal'?S.halCatalog:S.fysCatalog;
  let add=0,upd=0;
  exs.forEach(ex=>{const i=arr.findIndex(e=>e.name.toLowerCase()===ex.name.toLowerCase());if(i>=0){arr[i]={...arr[i],...ex,id:arr[i].id};upd++;}else{arr.push(ex);add++;}});
  scheduleSave(ct);
  if(st)st.innerHTML=`<span style="color:var(--green);">✓ ${add} nye, ${upd} opdateret</span>`;
  toast(`${add} øvelser importeret`);
  setTimeout(()=>{S.modal=null;render();},1400);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function toggleTrDropdown(){const d=ge('tr-dropdown');if(d)d.style.display=d.style.display==='none'?'block':'none';}
document.addEventListener('click',e=>{if(!e.target.closest('#tr-display')&&!e.target.closest('#tr-dropdown')){const d=ge('tr-dropdown');if(d)d.style.display='none';}});
function on(sel,fn){document.querySelectorAll(sel).forEach(el=>el.addEventListener('click',e=>fn(el,e)));}
function live(sel,fn){document.querySelectorAll(sel).forEach(el=>el.addEventListener('input',e=>fn(el,e)));}
function ge(id){return document.getElementById(id);}
function v(id){return ge(id)?.value;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function durMin(s,e){if(!s||!e)return 0;const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);return Math.max(0,(eh*60+em)-(sh*60+sm));}
function exportCatalog(fmt){
  const cat=S.catTab==='hal'?S.halCatalog:S.fysCatalog;
  const name=S.catTab==='hal'?'Haltræning':'Fysisk_træning';
  const cols=['Navn','Beskrivelse','Tags','Stjerner','Link','Varianter'];
  const rows=cat.map(e=>[
    e.name||'',
    e.desc||'',
    (e.tags||[]).join(', '),
    e.stars||'',
    e.link||'',
    (e.variants||[]).join('; ')
  ]);
  if(fmt==='csv'){
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    const csv=[cols,...rows].map(r=>r.map(esc).join(',')).join('\r\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    dlBlob(blob,`Ajax_${name}.csv`);
  } else {
    // Simple XLSX via HTML table trick — opens correctly in Excel
    const esc=v=>String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const tr=cells=>'<tr>'+cells.map(c=>'<td>'+esc(c)+'</td>').join('')+'</tr>';
    const xml=`<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="${name}"><Table>`
      +'<Row>'+cols.map(c=>`<Cell><Data ss:Type="String">${esc(c)}</Data></Cell>`).join('')+'</Row>'
      +rows.map(r=>'<Row>'+r.map(v=>`<Cell><Data ss:Type="String">${esc(v)}</Data></Cell>`).join('')+'</Row>').join('')
      +'</Table></Worksheet></Workbook>';
    const blob=new Blob([xml],{type:'application/vnd.ms-excel;charset=utf-8'});
    dlBlob(blob,`Ajax_${name}.xls`);
  }
  toast(`Eksporterer ${cat.length} øvelser…`);
}
function dlBlob(blob,filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function totalMins(t){
  const secs=t.sections||[];
  // For grouped sections: only count the max mins within each group (they run in parallel)
  const groups={};
  let total=0;
  secs.forEach(sec=>{
    const m=parseInt(sec.mins)||0;
    if(sec.group){
      groups[sec.group]=Math.max(groups[sec.group]||0,m);
    } else {
      total+=m;
    }
  });
  Object.values(groups).forEach(m=>total+=m);
  return total;
}
function trainingLabel(t){
  const wday=fmtWday(t.date);
  const loc=t.location||'';
  const parts=[wday,loc].filter(Boolean);
  return parts.length?parts.map(s=>s.charAt(0).toUpperCase()+s.slice(1)).join(' · '):'Træning';
}
const GRP_CLR={A:['#f59e0b','#78350f'],B:['#8b5cf6','#2e1065'],C:['#06b6d4','#164e63'],D:['#ec4899','#500724'],E:['#22c55e','#14532d'],F:['#f97316','#431407']};
const GROUPS=['A','B','C','D','E','F'];
function grpBadge(g){if(!g)return'';const[bg,fg]=GRP_CLR[g]||['#888','#000'];return`<span class="grp-badge" style="background:${bg};color:${fg};">${g}</span>`;}
function fmtDay(d){return d?+d.split('-')[2]:'?';}
function fmtWday(d){if(!d)return'';const days=['søn','man','tir','ons','tor','fre','lør'];return days[new Date(d).getDay()]||'';}
function fmtMon(d){if(!d)return'';return['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'][+d.split('-')[1]-1]||'';}
function updateTotalMins(){
  const t=S.draft; if(!t) return;
  // Read current values from inputs
  document.querySelectorAll('[data-secmins]').forEach(inp=>{
    const si=+inp.dataset.secmins;
    if(t.sections[si]) t.sections[si].mins=parseInt(inp.value)||0;
  });
  const dur=durMin(t.startTime,t.endTime);
  const tot=totalMins(t);
  const el=document.getElementById('total-mins-display');
  if(el){
    const mc=tot>dur?'mins-over':tot>dur*.9?'mins-warn':'mins-ok';
    el.innerHTML=`Varighed: <strong>${dur>0?dur+' min':'–'}</strong> · Total planlagt: <strong class="${mc}" style="font-size:14px;">${tot} min</strong>${tot>dur&&dur>0?'<span style="color:var(--red);font-weight:600;"> ⚠ '+(tot-dur)+' min over!</span>':''}`;
  }
}
function toast(msg,type='ok'){const c=ge('toastWrap');const d=document.createElement('div');d.className=`toast toast-${type}`;d.textContent=msg;c.appendChild(d);setTimeout(()=>d.remove(),2800);}

// Load XLSX lib then start
const s=document.createElement('script');
s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
s.onload=()=>loadFromSheets();
document.head.appendChild(s);

// Expose internals for test runner
window._ajaxApp = { getS: ()=>S, getRender: ()=>render };
</script>
